                  <div style={{marginTop:24,borderTop:'1px solid var(--border)',paddingTop:20}}>
                    <p style={{fontSize:12,fontWeight:600,color:'var(--text-primary)',marginBottom:12}}>New here?</p>
                    <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                      <button className="btn btn-secondary btn-small" onClick={() => { setScreen('signup'); setErr(''); setSignupForm({firstName:'',lastName:'',cell:'',email:''}); }}>Join as Player</button>
                      <button className="btn btn-secondary btn-small" style={{borderColor:'var(--yellow)',color:'var(--yellow)'}} onClick={() => { setScreen('signup-commish'); setErr(''); setSignupForm({firstName:'',lastName:'',cell:'',email:''}); setCommishLeagueForm({leagueName:'',teamAName:'White',teamBName:'Dark',format:'5v5'}); }}>Start a League</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {screen === 'verify' && (
            <div>
              <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:4}}>Welcome back, <strong style={{color:'var(--text-primary)'}}>{foundPlayer.firstName}</strong></p>
              <p style={{color:'var(--text-muted)',fontSize:12,marginBottom:16}}>Enter the 6-digit code sent to your {verifyMethod}</p>
              <div className="verify-code-display">
                <div className="label">Your Verification Code</div>
                <div className="code">{generatedCode}</div>
                <div className="method">Simulated — in production this would be sent to your {verifyMethod}</div>
              </div>
              {err && <div className="login-error">{err}</div>}
              <input className="verify-input" placeholder="000000" maxLength="6" value={verifyCode} onChange={e => { setVerifyCode(e.target.value.replace(/\D/g,'')); setErr(''); }} onKeyDown={e => e.key === 'Enter' && handleVerify()} />
              <button className="btn btn-primary" onClick={handleVerify}>Verify & Sign In</button>
              <p style={{marginTop:16}}><span className="login-link" onClick={() => { setScreen('login'); setErr(''); setVerifyCode(''); }}>Back to login</span></p>
            </div>
          )}

          {screen === 'signup' && (
            <div>
              <p style={{fontSize:15,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>Join as Player</p>
              <p style={{color:'var(--text-muted)',fontSize:12,marginBottom:16}}>Create your account to join leagues and track your stats.</p>
              {err && <div className="login-error">{err}</div>}
              <input placeholder="First Name *" value={signupForm.firstName} onChange={e => setSignupForm({...signupForm, firstName:e.target.value})} />
              <input placeholder="Last Name *" value={signupForm.lastName} onChange={e => setSignupForm({...signupForm, lastName:e.target.value})} />
              <input placeholder="Email" type="email" value={signupForm.email} onChange={e => setSignupForm({...signupForm, email:e.target.value})} />
              <input placeholder="Cell (555-555-5555)" value={signupForm.cell} onChange={e => setSignupForm({...signupForm, cell:e.target.value})} />
              <button className="btn btn-primary" onClick={handleSignup}>Create Player Account</button>
              <p style={{marginTop:16,fontSize:12,color:'var(--text-muted)'}}>
                Want to start a league? <span className="login-link" onClick={() => { setScreen('signup-commish'); setErr(''); }}>Sign up as Commissioner</span>
              </p>
              <p style={{marginTop:8}}><span className="login-link" onClick={() => { setScreen('login'); setErr(''); }}>Back to login</span></p>
            </div>
          )}

          {screen === 'signup-commish' && (
            <div>
              <p style={{fontSize:15,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>Start a League</p>
              <p style={{color:'var(--text-muted)',fontSize:12,marginBottom:16}}>Create your account and set up your league. You'll be the commissioner.</p>
              {err && <div className="login-error">{err}</div>}

              <div style={{textAlign:'left',marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8,paddingLeft:10,borderLeft:'2px solid var(--brand)'}}>Your Info</div>
              </div>
              <input placeholder="First Name *" value={signupForm.firstName} onChange={e => setSignupForm({...signupForm, firstName:e.target.value})} />
              <input placeholder="Last Name *" value={signupForm.lastName} onChange={e => setSignupForm({...signupForm, lastName:e.target.value})} />
              <input placeholder="Email" type="email" value={signupForm.email} onChange={e => setSignupForm({...signupForm, email:e.target.value})} />
              <input placeholder="Cell (555-555-5555)" value={signupForm.cell} onChange={e => setSignupForm({...signupForm, cell:e.target.value})} />

              <div style={{textAlign:'left',marginTop:20,marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8,paddingLeft:10,borderLeft:'2px solid var(--yellow)'}}>League Setup</div>
              </div>
              <input placeholder="League Name *" value={commishLeagueForm.leagueName} onChange={e => setCommishLeagueForm({...commishLeagueForm, leagueName:e.target.value})} />
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <input placeholder="Team A Name" value={commishLeagueForm.teamAName} onChange={e => setCommishLeagueForm({...commishLeagueForm, teamAName:e.target.value})} style={{flex:1}} />
                <input placeholder="Team B Name" value={commishLeagueForm.teamBName} onChange={e => setCommishLeagueForm({...commishLeagueForm, teamBName:e.target.value})} style={{flex:1}} />
              </div>
              <select value={commishLeagueForm.format} onChange={e => setCommishLeagueForm({...commishLeagueForm, format:e.target.value})} style={{width:'100%',marginBottom:12}}>
                <option value="5v5">5 x 5</option>
                <option value="3v3">3 x 3</option>
              </select>
              <select value={commishLeagueForm.leagueType || 'closed'} onChange={e => setCommishLeagueForm({...commishLeagueForm, leagueType:e.target.value})} style={{width:'100%',marginBottom:12}}>
                <option value="closed">Private — Invite Only</option>
                <option value="open">Open — Anyone Can Join</option>
              </select>

              <button className="btn btn-primary" style={{background:'var(--yellow)',color:'#000'}} onClick={handleCommishSignup}>Create League &amp; Account</button>
              <p style={{marginTop:16,fontSize:12,color:'var(--text-muted)'}}>
                Just want to play? <span className="login-link" onClick={() => { setScreen('signup'); setErr(''); }}>Sign up as Player</span>
              </p>
              <p style={{marginTop:8}}><span className="login-link" onClick={() => { setScreen('login'); setErr(''); }}>Back to login</span></p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============= DASHBOARD ==============
function Dashboard({ roster, leagues, games, setTab, onViewGame }) {
  const totalGames = games.length;
  const completed = games.filter(g => isGameComplete(g)).length;
  const upcoming = games.filter(g => g.scoreA === null || g.scoreB === null).length;

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card"><div className="num">{roster.length}</div><div className="label">Players</div></div>
        <div className="stat-card"><div className="num">{leagues.length}</div><div className="label">Leagues</div></div>
        <div className="stat-card"><div className="num">{totalGames}</div><div className="label">Total Games</div></div>
        <div className="stat-card"><div className="num">{completed}</div><div className="label">Completed</div></div>
      </div>

      <div className="section-label">Upcoming Games</div>
      <div className="card">
        {upcoming === 0 ? (
          <div className="empty">
            <p>No upcoming games scheduled</p>
            <button className="btn btn-primary btn-small" style={{marginTop:14}} onClick={() => setTab('games')}>Schedule a Game</button>
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Date</th><th>League</th><th>Matchup</th><th>Format</th><th>Status</th></tr></thead>
              <tbody>
                {games.filter(g => g.scoreA === null || g.scoreB === null).slice(0,5).map(g => (
                  <tr key={g.id}>
                    <td>{fmtGameDate(g.gameDate)}</td>
                    <td>{g.leagueName || '—'}</td>
                    <td><strong style={{cursor:'pointer',color:'var(--brand)'}} onClick={() => onViewGame && onViewGame(g.id)}>{g.teamAName} vs {g.teamBName}</strong></td>
                    <td><span className="badge badge-brand">{g.format?.replace('-series','') || '5v5'}</span></td>
                    <td><span className={`badge ${g.locked ? 'badge-green' : 'badge-yellow'}`}>{g.locked ? 'Locked' : 'Open'}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="section-label" style={{marginTop:28}}>Recent Results</div>
      <div className="card">
        {completed === 0 ? (
          <div className="empty"><p>No completed games yet</p></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Date</th><th>Matchup</th><th>Score</th><th>Winner</th></tr></thead>
              <tbody>
                {games.filter(g => isGameComplete(g)).slice(-5).reverse().map(g => {
                  const wt = getGameWinTeam(g); const w = wt === 'A' ? g.teamAName : wt === 'B' ? g.teamBName : 'Tie';
                  return (
                    <tr key={g.id}>
                      <td>{fmtGameDate(g.gameDate)}</td>
                      <td><strong style={{cursor:'pointer',color:'var(--brand)'}} onClick={() => onViewGame && onViewGame(g.id)}>{g.teamAName} vs {g.teamBName}</strong></td>
                      <td>{g.scoreA !== null && g.scoreB !== null ? <strong>{g.scoreA} — {g.scoreB}</strong> : <span className="badge badge-green">{w} W</span>}</td>
                      <td><span className="badge badge-green">{w}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ============= ROSTER ==============
function Roster({ roster, setRoster, leagues, games, onViewGame }) {
  const [showForm, setShowForm] = useState(false);
  const [search, setSearch] = useState('');
  const [leagueFilter, setLeagueFilter] = useState('all');
  const [zipFilter, setZipFilter] = useState('');
  const [editId, setEditId] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [viewProfile, setViewProfile] = useState(null);
  const blank = { lastName:'', firstName:'', cell:'', email:'', city:'', state:'', college:'', level:'Not Rated', highestLevel:'', sport:'', leagueIds:[], leagueTeams:{}, leagueLevels:{}, birthday:'', heightFt:'', heightIn:'', heightNoShoes:false, weight:'', cellPrivate:false, emailPrivate:false, addressPrivate:false, position:'', status:'Active', statusDate:'', statusNote:'', statusIndefinite:false, injuryLocation:'', address:'', zip:'' };
  const [form, setForm] = useState(blank);

  const levels = ['Not Rated','Novice','Intermediate','Advanced','Game Changer','Pro'];
  const highestLevels = ['','Recreational','High School','Club','College','Semi-Pro','Pro'];
  const sports = ['','Basketball','Football','Baseball','Soccer','Tennis','Golf','Track & Field','Swimming','Volleyball','Other'];
  const states = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];

  const filtered = roster.filter(p => {
    const q = search.toLowerCase();
    const matchesSearch = !q || `${p.lastName} ${p.firstName} ${p.city} ${p.college} ${p.level} ${p.zip||''} ${p.address||''}`.toLowerCase().includes(q);
    const matchesLeague = leagueFilter === 'all' || leagueFilter === 'unassigned'
      ? (leagueFilter === 'all' || !(p.leagueIds || []).length)
      : (p.leagueIds || []).includes(leagueFilter);
    const matchesZip = !zipFilter || (p.zip && p.zip.startsWith(zipFilter));
    return matchesSearch && matchesLeague && matchesZip;
  });

  const activeLeague = leagueFilter !== 'all' && leagueFilter !== 'unassigned' ? (leagues || []).find(l => l.id === leagueFilter) : null;

  const handleSave = () => {
    if (!form.lastName || !form.firstName) return;
    if (editId) {
      setRoster(roster.map(p => p.id === editId ? { ...form, id: editId } : p));
    } else {
      setRoster([...roster, { ...form, id: uid() }]);
    }
    setForm(blank); setEditId(null); setShowForm(false);
  };

  const handleEdit = (p) => {
    setForm({ ...blank, ...p, highestLevel: p.highestLevel || '', sport: p.sport || '', leagueIds: p.leagueIds || [], leagueTeams: p.leagueTeams || {}, leagueLevels: p.leagueLevels || {}, status: p.status || 'Active', statusDate: p.statusDate || '', statusNote: p.statusNote || '', statusIndefinite: p.statusIndefinite || false, injuryLocation: p.injuryLocation || '' }); setEditId(p.id); setShowForm(true);
  };

  const toggleLeague = (lid) => {
    const current = form.leagueIds || [];
    const teams = { ...(form.leagueTeams || {}) };
    const lvls = { ...(form.leagueLevels || {}) };
    if (current.includes(lid)) {
      delete teams[lid];
      delete lvls[lid];
      setForm({...form, leagueIds: current.filter(id => id !== lid), leagueTeams: teams, leagueLevels: lvls});
    } else {
      teams[lid] = 'Swing';
      lvls[lid] = 'Not Rated';
      setForm({...form, leagueIds: [...current, lid], leagueTeams: teams, leagueLevels: lvls});
    }
  };


  const getLeagueInfo = (p) => {
    const ids = p.leagueIds || [];
    if (ids.length === 0) return null;
    return ids.map(id => {
      const l = (leagues || []).find(lg => lg.id === id);
      if (!l) return null;
      const team = (p.leagueTeams || {})[id] || 'Swing';
      const teamLabel = team === 'A' ? l.teamAName : team === 'B' ? l.teamBName : 'Swing';
      return { name: l.name, team, teamLabel };
    }).filter(Boolean);
  };

  const handleDelete = (id) => {
    const p = roster.find(pl => pl.id === id);
    setConfirmDelete({ id, name: p ? `${p.firstName} ${p.lastName}` : 'this player' });
  };
  const confirmDeletePlayer = () => {
    if (confirmDelete) { setRoster(roster.filter(p => p.id !== confirmDelete.id)); setConfirmDelete(null); }
  };

  const levelBadge = (lvl) => {
    const cls = { 'Not Rated':'badge-muted', Novice:'badge-novice', Intermediate:'badge-blue', Advanced:'badge-yellow', 'Game Changer':'badge-gc', Pro:'badge-brand' };
    return <span className={`badge ${cls[lvl] || 'badge-muted'}`}>{lvl}</span>;
  };

  const statusBadge = (p) => {
    const s = p.status || 'Active';
    const d = p.statusDate;
    const indef = p.statusIndefinite;
    const loc = p.injuryLocation || '';
    const fmtDate = (dt) => { if (!dt) return ''; const dd = new Date(dt+'T00:00:00'); return dd.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
    const durLabel = indef ? <span className="status-date">indefinite</span> : d ? <span className="status-date">{s === 'Inactive' ? 'until' : 'exp.'} {fmtDate(d)}</span> : null;
    if (s === 'Inactive') return <span className="status-inactive">Inactive {durLabel}</span>;
    if (s === 'IR') return <span className="status-ir">IR{loc ? ` \u00b7 ${loc}` : ''} {durLabel}</span>;
    return <span className="status-active">Active</span>;
  };

  // ---- PLAYER FULL PAGE PROFILE ----
  if (viewProfile) {
    const p = roster.find(r => r.id === viewProfile.id) || viewProfile;
    const initials = (p.firstName?.[0] || '') + (p.lastName?.[0] || '');
    const pLeagues = (p.leagueIds || []).map(id => (leagues || []).find(l => l.id === id)).filter(Boolean);
    const lvlCls = {'Not Rated':'badge-muted',Novice:'badge-novice',Intermediate:'badge-blue',Advanced:'badge-yellow','Game Changer':'badge-gc',Pro:'badge-brand'};

    // Player game stats
    const allPlayerGames = (games||[]).filter(g => (g.teamA||[]).includes(p.id) || (g.teamB||[]).includes(p.id));
    const completedPG = allPlayerGames.filter(g => isGameComplete(g));
    let pWins=0, pLosses=0, pGW=0;
    completedPG.forEach(g => {
      const onA = (g.teamA||[]).includes(p.id);
      const wt = getGameWinTeam(g);
      if ((onA && wt==='A') || (!onA && wt==='B')) pWins++;
      else if (wt && wt !== 'Tie') pLosses++;
      if (g.gameWinner === p.id) pGW++;
    });

    return (
      <div>
        <button className="btn btn-secondary btn-small" onClick={() => setViewProfile(null)} style={{marginBottom:20}}>&#8592; Back to Roster</button>

        {/* Player Header */}
        <div className="card" style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
          <div style={{width:64,height:64,borderRadius:'50%',background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,color:'#fff',flexShrink:0}}>{initials.toUpperCase()}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:22,fontWeight:700,letterSpacing:'-0.03em'}}>{p.firstName} {p.lastName}</div>
            <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              {p.position && <span style={{fontWeight:600,color:'var(--text-primary)'}}>{p.position}</span>}
              {p.sport && <span>{p.sport}</span>}
              {p.highestLevel && <span>{p.highestLevel}</span>}
              {calcAge(p.birthday) !== null && <span>Age {calcAge(p.birthday)}</span>}
              {fmtHeight(p) && <span>{fmtHeight(p)}</span>}
              {p.weight && <span>{p.weight} lbs</span>}
            </div>
            <div style={{marginTop:8}}>{statusBadge(p)}</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary btn-small" onClick={() => { setViewProfile(null); handleEdit(p); }}>Edit Player</button>
            <button className="btn btn-danger btn-small" onClick={() => { setViewProfile(null); handleDelete(p.id); }}>Remove</button>
          </div>
        </div>

        {/* Stats */}
        <div className="stat-grid" style={{marginTop:16}}>
          <div className="stat-card"><div className="num">{completedPG.length}</div><div className="label">Games Played</div></div>
          <div className="stat-card"><div className="num" style={{color:'var(--green)'}}>{pWins}</div><div className="label">Wins</div></div>
          <div className="stat-card"><div className="num" style={{color:'var(--red)'}}>{pLosses}</div><div className="label">Losses</div></div>
          <div className="stat-card"><div className="num">{completedPG.length > 0 ? ((pWins/completedPG.length*100).toFixed(0)+'%') : '—'}</div><div className="label">Win %</div></div>
          <div className="stat-card"><div className="num" style={{color:'var(--brand)'}}>{pGW}</div><div className="label">Game Winner</div></div>
          <div className="stat-card"><div className="num">{pLeagues.length}</div><div className="label">Leagues</div></div>
        </div>

        {/* Two-column: Bio + Status */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:16}}>
          {/* Bio */}
          <div className="card">
            <div className="section-label" style={{marginBottom:14}}>Player Info</div>
            <div className="profile-grid">
              <div className="profile-field"><span className="profile-field-label">Birthday</span><span className={`profile-field-value ${!p.birthday?'empty':''}`}>{p.birthday ? new Date(p.birthday+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Age</span><span className="profile-field-value" style={{fontWeight:700,fontSize:20}}>{calcAge(p.birthday) !== null ? calcAge(p.birthday) : '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Height</span><span className="profile-field-value" style={{fontWeight:700,fontSize:20}}>{fmtHeight(p) || '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Weight</span><span className="profile-field-value" style={{fontWeight:700,fontSize:20}}>{p.weight ? `${p.weight} lbs` : '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Address {p.addressPrivate && <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700,marginLeft:4}}>PRIVATE</span>}</span><span className={`profile-field-value ${!p.address?'empty':''}`}>{p.address || '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Location {p.addressPrivate && <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700,marginLeft:4}}>PRIVATE</span>}</span><span className={`profile-field-value ${!p.city?'empty':''}`}>{p.city ? `${p.city}${p.state?`, ${p.state}`:''}${p.zip?` ${p.zip}`:''}` : '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">College</span><span className={`profile-field-value ${!p.college?'empty':''}`}>{p.college || '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Position</span><span className={`profile-field-value ${!p.position?'empty':''}`} style={{fontWeight:700}}>{p.position || '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Sport</span><span className={`profile-field-value ${!p.sport?'empty':''}`}>{p.sport || '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Highest Level</span><span className={`profile-field-value ${!p.highestLevel?'empty':''}`}>{p.highestLevel || '—'}</span></div>
            </div>
          </div>

          {/* Contact + Status */}
          <div className="card">
            <div className="section-label" style={{marginBottom:14}}>Contact</div>
            <div className="profile-grid">
              <div className="profile-field"><span className="profile-field-label">Cell {p.cellPrivate && <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700,marginLeft:4}}>PRIVATE</span>}</span><span className={`profile-field-value ${!p.cell?'empty':''}`}>{p.cell || '—'}</span></div>
              <div className="profile-field"><span className="profile-field-label">Email {p.emailPrivate && <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700,marginLeft:4}}>PRIVATE</span>}</span><span className={`profile-field-value ${!p.email?'empty':''}`}>{p.email || '—'}</span></div>
            </div>
            {(p.status === 'Inactive' || p.status === 'IR') && (
              <div style={{marginTop:16}}>
                <div className="section-label" style={{marginBottom:14}}>{p.status === 'IR' ? 'Injured Reserve' : 'Inactive'}</div>
                <div className="profile-grid">
                  <div className="profile-field"><span className="profile-field-label">{p.status === 'Inactive' ? 'Until' : 'Expected Return'}</span><span className="profile-field-value">{p.statusIndefinite ? 'Indefinite' : p.statusDate ? new Date(p.statusDate+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : 'TBD'}</span></div>
                  {p.status === 'IR' && <div className="profile-field"><span className="profile-field-label">Location</span><span className="profile-field-value">{p.injuryLocation || '—'}</span></div>}
                  <div className="profile-field"><span className="profile-field-label">{p.status === 'IR' ? 'Detail' : 'Reason'}</span><span className="profile-field-value">{p.statusNote || '—'}</span></div>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Leagues */}
        <div className="card" style={{marginTop:16}}>
          <div className="section-label" style={{marginBottom:14}}>Leagues, Teams &amp; Skill Levels</div>
          {pLeagues.length > 0 ? (
            <div className="table-wrap"><table>
              <thead><tr><th>League</th><th>Team</th><th>Skill Level</th></tr></thead>
              <tbody>
                {pLeagues.map(l => {
                  const tm = (p.leagueTeams||{})[l.id] || 'Swing';
                  const tmLabel = tm === 'A' ? l.teamAName : tm === 'B' ? l.teamBName : 'Swing';
                  const tmColor = tm === 'A' ? 'var(--blue)' : tm === 'B' ? 'var(--green)' : 'var(--yellow)';
                  const pLvl = (p.leagueLevels||{})[l.id] || 'Not Rated';
                  const updateLevel = (newLvl) => {
                    const updated = roster.map(r => {
                      if (r.id !== p.id) return r;
                      return { ...r, leagueLevels: { ...(r.leagueLevels||{}), [l.id]: newLvl } };
                    });
                    setRoster(updated);
                  };
                  return (
                    <tr key={l.id}>
                      <td><strong>{l.name}</strong></td>
                      <td><span style={{fontSize:10,padding:'3px 8px',borderRadius:4,background:tmColor,color:'#fff',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em'}}>{tmLabel}</span></td>
                      <td>
                        <select value={pLvl} onChange={e => updateLevel(e.target.value)} style={{padding:'4px 8px',fontSize:11,fontWeight:700,borderRadius:4,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text-primary)',fontFamily:'inherit',cursor:'pointer'}}>
                          {['Not Rated','Novice','Intermediate','Advanced','Game Changer','Pro'].map(lv => <option key={lv} value={lv}>{lv}</option>)}
                        </select>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table></div>
          ) : <p style={{color:'var(--text-muted)',fontSize:13}}>No leagues assigned</p>}
        </div>

        {/* Game History */}
        {completedPG.length > 0 && (
          <div className="card" style={{marginTop:16}}>
            <div className="section-label" style={{marginBottom:14}}>Game History ({completedPG.length})</div>
            <div className="table-wrap"><table>
              <thead><tr><th>Date</th><th>Matchup</th><th>Score</th><th style={{textAlign:'right'}}>+/-</th><th>Result</th><th>GW</th></tr></thead>
              <tbody>
                {completedPG.slice().sort((a,b) => (b.gameDate||'').localeCompare(a.gameDate||'')).map(g => {
                  const onA = (g.teamA||[]).includes(p.id);
                  const wt = getGameWinTeam(g);
                  const won = (onA && wt==='A') || (!onA && wt==='B');
                  const tied = wt === 'Tie';
                  const hs = g.scoreA !== null && g.scoreB !== null;
                  const diff = hs ? Math.abs(g.scoreA - g.scoreB) : null;
                  const isGW = g.gameWinner === p.id;
                  return (
                    <tr key={g.id}>
                      <td style={{whiteSpace:'nowrap'}}>{fmtGameDate(g.gameDate)}</td>
                      <td><strong style={{cursor:'pointer',color:'var(--brand)'}} onClick={() => onViewGame && onViewGame(g.id)}>{g.teamAName} vs {g.teamBName}</strong></td>
                      <td>{hs ? <strong>{g.scoreA} — {g.scoreB}</strong> : '—'}</td>
                      <td style={{textAlign:'right',fontWeight:700}}>{diff !== null ? diff : '—'}</td>
                      <td><span className={`badge ${tied ? 'badge-yellow' : won ? 'badge-green' : 'badge-red'}`}>{tied ? 'Tie' : won ? 'Win' : 'Loss'}</span></td>
                      <td>{isGW ? <span className="badge badge-brand">GW</span> : '—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table></div>
          </div>
        )}
      </div>
    );
  }

  // ---- ROSTER LIST VIEW ----
  return (
    <div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:16}}>
          <h2 style={{margin:0}}>Player Roster <span style={{color:'var(--text-muted)',fontWeight:400}}>({(leagueFilter !== 'all' || zipFilter) ? `${filtered.length} / ` : ''}{roster.length})</span></h2>
          <button className="btn btn-primary" onClick={() => { setForm(blank); setEditId(null); setShowForm(true); }}>+ Add Player</button>
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
          <input placeholder="Search by name, city, college, zip..." value={search} onChange={e => setSearch(e.target.value)} style={{flex:1,minWidth:180}} />
          <input placeholder="Zip code" value={zipFilter} onChange={e => setZipFilter(e.target.value.replace(/\D/g,''))} maxLength="5" style={{width:90}} />
          <select value={leagueFilter} onChange={e => setLeagueFilter(e.target.value)} style={{minWidth:180}}>
            <option value="all">All Players</option>
            <option value="unassigned">Unassigned</option>
            {(leagues || []).map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        </div>
        {activeLeague && (
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,paddingLeft:12,borderLeft:'2px solid var(--brand)'}}>
            <span style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Showing</span>
            <span className="league-tag" style={{fontSize:12,padding:'4px 10px'}}>{activeLeague.name}</span>
            <span style={{fontSize:12,color:'var(--text-muted)'}}>{filtered.length} player{filtered.length !== 1 ? 's' : ''}</span>
          </div>
        )}
        {zipFilter && (
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,paddingLeft:12,borderLeft:'2px solid var(--blue)'}}>
            <span style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Zip</span>
            <span className="badge badge-blue" style={{fontSize:12,padding:'4px 10px'}}>{zipFilter}</span>
            <span style={{fontSize:12,color:'var(--text-muted)'}}>{filtered.length} player{filtered.length !== 1 ? 's' : ''}</span>
            <span className="login-link" style={{fontSize:11}} onClick={() => setZipFilter('')}>Clear</span>
          </div>
        )}
        {filtered.length === 0 ? (
          <div className="empty"><p>{roster.length === 0 ? 'No players yet. Add your first player.' : 'No matches found.'}</p></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr><th style={{width:220}}>Player</th><th>Status</th><th>Level</th><th>Leagues</th><th>Contact</th><th>Background</th><th style={{width:90}}>Actions</th></tr></thead>
              <tbody>
                {filtered.sort((a,b) => {
                  // 1. Active first, then Inactive, then IR
                  const statusOrder = {'Active':0,'Inactive':1,'IR':2};
                  const aStatus = statusOrder[a.status||'Active'] ?? 0;
                  const bStatus = statusOrder[b.status||'Active'] ?? 0;
                  if (aStatus !== bStatus) return aStatus - bStatus;
                  // 2. Highest level
                  const levelOrder = {'Pro':0,'Game Changer':1,'Advanced':2,'Intermediate':3,'Novice':4,'Not Rated':5};
                  const getBestLevel = (p) => { const vals = Object.values(p.leagueLevels||{}).filter(v=>v&&v!=='Not Rated'); return vals.length ? (['Pro','Game Changer','Advanced','Intermediate','Novice'].find(lv=>vals.includes(lv))||'Not Rated') : 'Not Rated'; };
                  const aLvlKey = activeLeague ? ((a.leagueLevels||{})[activeLeague.id] || 'Not Rated') : getBestLevel(a);
                  const bLvlKey = activeLeague ? ((b.leagueLevels||{})[activeLeague.id] || 'Not Rated') : getBestLevel(b);
                  const aLvl = levelOrder[aLvlKey] ?? 6;
                  const bLvl = levelOrder[bLvlKey] ?? 6;
                  if (aLvl !== bLvl) return aLvl - bLvl;
                  // 3. Alpha by last name
                  return a.lastName.localeCompare(b.lastName);
                }).map(p => {
                  const lInfo = getLeagueInfo(p);
                  const bestLvl = activeLeague ? calcBlendedLevel(p, activeLeague.id).level : (() => { const ids = p.leagueIds||[]; if (!ids.length) return 'Not Rated'; const scores = ids.map(lid => calcBlendedLevel(p,lid)).filter(b=>b.hasData); if (!scores.length) return 'Not Rated'; const best = Math.max(...scores.map(s=>s.score)); return NUM_TO_LEVEL(best); })();
                  const initials = (p.firstName?.[0]||'')+(p.lastName?.[0]||'');
                  return (
                  <tr key={p.id} style={{verticalAlign:'top'}}>
                    {/* Player: name, age, ht, wt */}
                    <td style={{padding:'12px 12px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div style={{width:36,height:36,borderRadius:'50%',background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff',flexShrink:0}}>{initials.toUpperCase()}</div>
                        <div>
                          <strong style={{cursor:'pointer',color:'var(--brand)',fontSize:14}} onClick={() => setViewProfile(p)}>{p.lastName}, {p.firstName}</strong>
                          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
                            {p.position && <span style={{fontWeight:600,color:'var(--text-primary)'}}>{p.position}</span>}
                            {calcAge(p.birthday) !== null && <span>Age {calcAge(p.birthday)}</span>}
                            {fmtHeight(p) && <span>{fmtHeight(p)}</span>}
                            {p.weight && <span>{p.weight} lbs</span>}
                          </div>
                        </div>
                      </div>
                    </td>
                    {/* Status */}
                    <td style={{padding:'14px 12px'}}>{statusBadge(p)}</td>
                    {/* Level */}
                    <td style={{padding:'14px 12px'}}>{levelBadge(bestLvl)}</td>
                    {/* Leagues */}
                    <td style={{padding:'14px 12px'}}>{lInfo ? <div style={{display:'flex',flexWrap:'wrap',gap:3}}>{lInfo.map(li => {
                      const tc = li.team === 'A' ? 'var(--blue)' : li.team === 'B' ? 'var(--green)' : 'var(--yellow)';
                      return <span key={li.name} style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 6px',borderRadius:4,background:'var(--bg-subtle)',border:'1px solid var(--border)',fontSize:10,fontWeight:600}}>{li.name}<span style={{fontSize:8,padding:'1px 3px',borderRadius:2,background:tc,color:'#fff'}}>{li.teamLabel}</span></span>;
                    })}</div> : <span style={{fontSize:11,color:'var(--text-muted)'}}>—</span>}</td>
                    {/* Contact */}
                    <td style={{padding:'14px 12px'}}>
                      <div style={{fontSize:12,color:'var(--text-muted)'}}>
                        {p.cell && <div>{p.cell}{p.cellPrivate && <span style={{fontSize:8,padding:'1px 4px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700,marginLeft:4}}>P</span>}</div>}
                        {p.email && <div style={{marginTop:2}}>{p.email}{p.emailPrivate && <span style={{fontSize:8,padding:'1px 4px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700,marginLeft:4}}>P</span>}</div>}
                        {!p.cell && !p.email && '—'}
                      </div>
                    </td>
                    {/* Background */}
                    <td style={{padding:'14px 12px'}}>
                      <div style={{fontSize:11,color:'var(--text-muted)',display:'flex',gap:6,flexWrap:'wrap'}}>
                        {p.sport && <span>{p.sport}</span>}
                        {p.highestLevel && <span>{p.highestLevel}</span>}
                        {(p.city || p.college) && <span>{p.city ? `${p.city}${p.state?`, ${p.state}`:''}` : ''}{p.city && p.college ? ' \u00b7 ' : ''}{p.college || ''}</span>}
                        {p.zip && <span style={{fontWeight:600}}>{p.zip}</span>}
                        {!p.sport && !p.highestLevel && !p.city && !p.college && !p.zip && '—'}
                      </div>
                    </td>
                    {/* Actions */}
                    <td style={{padding:'14px 12px'}}>
                      <div style={{display:'flex',gap:4}}>
                        <button className="btn btn-secondary btn-small" onClick={() => handleEdit(p)}>Edit</button>
                        <button className="btn btn-danger btn-small" onClick={() => handleDelete(p.id)}>Remove</button>
                      </div>
                    </td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {showForm && (
        <div className="modal-overlay" onClick={() => setShowForm(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setShowForm(false)}>&#x2715;</button>
            <h2>{editId ? 'Edit Player' : 'Add Player'}</h2>
            <div className="form-grid">
              <div className="form-group"><label>Last Name *</label><input value={form.lastName} onChange={e => setForm({...form, lastName:e.target.value})} /></div>
              <div className="form-group"><label>First Name *</label><input value={form.firstName} onChange={e => setForm({...form, firstName:e.target.value})} /></div>
              <div className="form-group"><label>Cell</label><input value={form.cell} onChange={e => setForm({...form, cell:e.target.value})} placeholder="555-555-5555" /><label style={{display:'flex',alignItems:'center',gap:4,marginTop:4,fontSize:11,color:'var(--text-muted)',cursor:'pointer',textTransform:'none',letterSpacing:0,fontWeight:400}}><input type="checkbox" checked={form.cellPrivate||false} onChange={e => setForm({...form, cellPrivate:e.target.checked})} style={{width:14,height:14,margin:0}} /> Private — hidden from other players</label></div>
              <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e => setForm({...form, email:e.target.value})} /><label style={{display:'flex',alignItems:'center',gap:4,marginTop:4,fontSize:11,color:'var(--text-muted)',cursor:'pointer',textTransform:'none',letterSpacing:0,fontWeight:400}}><input type="checkbox" checked={form.emailPrivate||false} onChange={e => setForm({...form, emailPrivate:e.target.checked})} style={{width:14,height:14,margin:0}} /> Private — hidden from other players</label></div>
              <div className="form-group"><label>Birthday</label><input type="date" value={form.birthday || ''} onChange={e => setForm({...form, birthday:e.target.value})} />{form.birthday && <span style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Age: {calcAge(form.birthday)}</span>}</div>
              <div className="form-group"><label>Height</label>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <select value={form.heightFt || ''} onChange={e => setForm({...form, heightFt:e.target.value})} style={{width:70}}>
                    <option value="">Ft</option>
                    {[4,5,6,7].map(f => <option key={f} value={String(f)}>{f}'</option>)}
                  </select>
                  <select value={form.heightIn || ''} onChange={e => setForm({...form, heightIn:e.target.value})} style={{width:80}}>
                    <option value="">In</option>
                    {[0,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10,10.5,11,11.5].map(i => <option key={i} value={String(i)}>{i}"</option>)}
                  </select>
                  <label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--text-muted)',cursor:'pointer',whiteSpace:'nowrap'}}>
                    <input type="checkbox" checked={form.heightNoShoes || false} onChange={e => setForm({...form, heightNoShoes:e.target.checked})} style={{width:14,height:14,margin:0}} />
                    No shoes
                  </label>
                </div>
                {form.heightFt && <span style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{form.heightFt}'{form.heightIn || '0'}"{form.heightNoShoes ? ' (no shoes)' : ''}</span>}
              </div>
              <div className="form-group"><label>Weight (lbs)</label><input type="number" min="0" value={form.weight || ''} onChange={e => setForm({...form, weight:e.target.value})} placeholder="e.g. 185" /></div>
              <div className="form-group"><label>Player Status</label>
                <select value={form.status || 'Active'} onChange={e => setForm({...form, status:e.target.value, statusDate: e.target.value === 'Active' ? '' : form.statusDate, statusNote: e.target.value === 'Active' ? '' : form.statusNote, statusIndefinite: e.target.value === 'Active' ? false : form.statusIndefinite, injuryLocation: e.target.value === 'IR' ? (form.injuryLocation || '') : ''})}>
                  <option value="Active">Active</option>
                  <option value="Inactive">Inactive</option>
                  <option value="IR">Injured Reserve (IR)</option>
                </select>
              </div>
              {form.status && form.status !== 'Active' && (
                <div className="form-group"><label>Duration</label>
                  <select value={form.statusIndefinite ? 'indefinite' : 'date'} onChange={e => setForm({...form, statusIndefinite: e.target.value === 'indefinite', statusDate: e.target.value === 'indefinite' ? '' : form.statusDate})}>
                    <option value="date">Until specific date</option>
                    <option value="indefinite">Indefinite</option>
                  </select>
                </div>
              )}
              {form.status && form.status !== 'Active' && !form.statusIndefinite && (
                <div className="form-group"><label>{form.status === 'Inactive' ? 'Inactive Until' : 'Expected Return'}</label><input type="date" value={form.statusDate || ''} onChange={e => setForm({...form, statusDate:e.target.value})} /></div>
              )}
              {form.status === 'IR' && (
                <div className="form-group"><label>Injury Location</label>
                  <select value={form.injuryLocation || ''} onChange={e => setForm({...form, injuryLocation:e.target.value})}>
                    <option value="">Select...</option>
                    <option>Upper Body</option>
                    <option>Knee</option>
                    <option>Calf</option>
                    <option>Ankle</option>
                    <option>Foot</option>
                    <option>Back</option>
                  </select>
                </div>
              )}
              {form.status && form.status !== 'Active' && (
                <div className="form-group"><label>{form.status === 'IR' ? 'Injury Detail' : 'Reason'}</label><input value={form.statusNote || ''} onChange={e => setForm({...form, statusNote:e.target.value})} placeholder={form.status === 'IR' ? 'e.g. Sprain, strain, soreness' : 'e.g. Travel, personal'} /></div>
              )}
              <div className="form-group" style={{gridColumn:'1 / -1'}}><label>Street Address</label><input value={form.address || ''} onChange={e => setForm({...form, address:e.target.value})} placeholder="123 Main St" /><label style={{display:'flex',alignItems:'center',gap:4,marginTop:4,fontSize:11,color:'var(--text-muted)',cursor:'pointer',textTransform:'none',letterSpacing:0,fontWeight:400}}><input type="checkbox" checked={form.addressPrivate||false} onChange={e => setForm({...form, addressPrivate:e.target.checked})} style={{width:14,height:14,margin:0}} /> Private — hide address from other players</label></div>
              <div className="form-group"><label>City</label><input value={form.city} onChange={e => setForm({...form, city:e.target.value})} /></div>
              <div className="form-group"><label>State</label>
                <select value={form.state} onChange={e => setForm({...form, state:e.target.value})}>
                  <option value="">Select...</option>
                  {states.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Zip Code</label><input value={form.zip || ''} onChange={e => setForm({...form, zip:e.target.value})} placeholder="37201" maxLength="10" /></div>
              <div className="form-group"><label>College</label><input value={form.college} onChange={e => setForm({...form, college:e.target.value})} /></div>
              <div className="form-group"><label>Sport</label>
                <select value={form.sport} onChange={e => setForm({...form, sport:e.target.value})}>
                  {sports.map(s => <option key={s} value={s}>{s || 'Select...'}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Position</label>
                <select value={form.position || ''} onChange={e => setForm({...form, position:e.target.value})}>
                  {['','PG','SG','SF','PF','C','G','F'].map(pos => <option key={pos} value={pos}>{pos ? ({'PG':'Point Guard (PG)','SG':'Shooting Guard (SG)','SF':'Small Forward (SF)','PF':'Power Forward (PF)','C':'Center (C)','G':'Guard (G)','F':'Forward (F)'})[pos] : 'Select...'}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Highest Level Played</label>
                <select value={form.highestLevel} onChange={e => setForm({...form, highestLevel:e.target.value})}>
                  {highestLevels.map(h => <option key={h} value={h}>{h || 'Select...'}</option>)}
                </select>
              </div>
              {leagues && leagues.length > 0 && (
                <div className="form-group" style={{gridColumn:'1 / -1'}}>
                  <label>Assign to Leagues</label>
                  <div className="league-checks">
                    {leagues.map(lg => {
                      const checked = (form.leagueIds || []).includes(lg.id);
                      return (
                        <label key={lg.id} className={`league-check ${checked ? 'checked' : ''}`} onClick={() => toggleLeague(lg.id)}>
                          <span className="check-mark">
                            <svg viewBox="0 0 10 10" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1.5 5.5 4 8 8.5 2.5"/></svg>
                          </span>
                          {lg.name}
                        </label>
                      );
                    })}
                  </div>
                  <p style={{fontSize:11,color:'var(--text-muted)',marginTop:6}}>Team assignments are managed in the Leagues tab.</p>
                </div>
              )}
            </div>
            <div className="btn-group">
              <button className="btn btn-primary" onClick={handleSave}>{editId ? 'Save Changes' : 'Add Player'}</button>
              <button className="btn btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {confirmDelete && (
        <ConfirmModal
          title="Remove Player"
          message={`Are you sure you want to remove ${confirmDelete.name} from the roster?`}
          confirmLabel="Remove"
          onConfirm={confirmDeletePlayer}
          onCancel={() => setConfirmDelete(null)}
        />
      )}
    </div>
  );
}

// ============= LEAGUES ==============
function Leagues({ leagues, setLeagues, roster, setRoster, games, setGames, showToast, onViewGame }) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [manageCommish, setManageCommish] = useState(null);
  const [viewLeague, setViewLeague] = useState(null);
  const [inviteLeague, setInviteLeague] = useState(null);
  const [gameYear, setGameYear] = useState(String(new Date().getFullYear()));
  const [addCommishId, setAddCommishId] = useState('');
  const allDays = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const leagueLevels = ['Not Rated','Novice','Intermediate','Advanced','Game Changer','Pro'];
  const blank = { name:'', daysPerWeek:1, gameDays:[], teamAName:'Team A', teamBName:'Team B', format:'5v5', seriesBestOf:3, level:'Not Rated', commissioners:[], startTimeType:'fixed', startTime:'', address:'', gameNotes:'', leagueType:'closed', bettingLineEnabled:false };
  const [form, setForm] = useState(blank);
  const [selectedPlayers, setSelectedPlayers] = useState([]);

            {(gameYears.length > 0 ? gameYears : [String(new Date().getFullYear())]).map(y => (

            ))}

                      <div style={{textAlign:'center',flex:1}}>
                        <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',color: lastGame.scoreA > lastGame.scoreB ? 'var(--text-primary)' : 'var(--text-muted)',marginBottom:2}}>{lastGame.teamAName}</div>

                              <button className="btn btn-primary btn-small" onClick={autoBuildNextGame}>Build Rosters</button>
                              {lastGame && ((lastGame.teamA||[]).length > 0 || (lastGame.teamB||[]).length > 0) && setGames && (
                                <button className="btn btn-secondary btn-small" onClick={(e) => {
                                  e.stopPropagation();
                                  const updated = games.map(g => g.id === nextGame.id ? {...g, teamA:[...(lastGame.teamA||[])], teamB:[...(lastGame.teamB||[])]} : g);
                                  setGames(updated);
                                  showToast && showToast(`Run it Back! ${(lastGame.teamA||[]).length + (lastGame.teamB||[]).length} players loaded.`);
                                }}>&#9851; Run it Back</button>
                              )}
                            </div>
                          </div>
                        )}
                        {/* Betting Line */}
                        {hasRosters && l.bettingLineEnabled && (
                          <div style={{marginTop:10}}>
                            <BettingLineCard game={nextGame} games={games} roster={roster} compact={true} />
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })() : (
                  <div style={{padding:'24px 20px',textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No upcoming games scheduled</div>
                )}
              </div>
            </div>
          );
        })()}

        {/* Key Stats */}
        {(() => {
          const scoredGames = completedGames.filter(gg => gg.scoreA !== null && gg.scoreB !== null);
          const totalDiff = scoredGames.reduce((s,gg) => s + Math.abs(gg.scoreA - gg.scoreB), 0);
          const avgDiff = scoredGames.length > 0 ? (totalDiff / scoredGames.length).toFixed(1) : null;
          const closestGame = scoredGames.length > 0 ? Math.min(...scoredGames.map(gg => Math.abs(gg.scoreA - gg.scoreB))) : null;
          const biggestBlowout = scoredGames.length > 0 ? Math.max(...scoredGames.map(gg => Math.abs(gg.scoreA - gg.scoreB))) : null;
          return (
            <div className="stat-grid" style={{marginTop:16}}>
              <div className="stat-card"><div className="num">{lPlayers.length}</div><div className="label">Players</div></div>
              <div className="stat-card"><div className="num">{avgAge || '—'}</div><div className="label">Avg Age</div></div>
              <div className="stat-card"><div className="num">{completedGames.length}</div><div className="label">Games Played {gameYear !== 'all' ? gameYear : ''}</div></div>
              <div className="stat-card"><div className="num">{upcomingGames.length}</div><div className="label">Upcoming {gameYear !== 'all' ? gameYear : ''}</div></div>
              {avgDiff !== null && <div className="stat-card"><div className="num">{avgDiff}</div><div className="label">Avg +/-</div></div>}
              {closestGame !== null && <div className="stat-card"><div className="num">{closestGame}</div><div className="label">Closest Game</div></div>}
              {biggestBlowout !== null && <div className="stat-card"><div className="num">{biggestBlowout}</div><div className="label">Biggest Blowout</div></div>}
              {gameYear !== 'all' && <div className="stat-card"><div className="num">{allCompleted.length}</div><div className="label">All Time Games</div></div>}
            </div>
          );
        })()}

        {/* League Details + Age + Commissioners in a row */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:12}}>
          <div className="card">
            <div className="section-label" style={{marginBottom:14}}>League Details</div>
            <div className="profile-grid">
              <div className="profile-field">
                <span className="profile-field-label">Level</span>
                <span className="profile-field-value"><span className={`badge ${levelBadgeCls[l.level] || 'badge-muted'}`}>{l.level || 'Not Rated'}</span></span>
              </div>
              <div className="profile-field">
                <span className="profile-field-label">Access</span>
                <span className="profile-field-value">{l.leagueType === 'open' ? <span className="badge badge-green">Open</span> : <span className="badge badge-muted">Private</span>}</span>
              </div>
              <div className="profile-field">
                <span className="profile-field-label">Format</span>
                <span className="profile-field-value">{FORMAT_LABEL(l.format)}{isSeries(l.format) ? ` \u00b7 Best of ${l.seriesBestOf||3}` : ''}</span>
              </div>
              <div className="profile-field">
                <span className="profile-field-label">Frequency</span>
                <span className="profile-field-value">{l.frequencyType === 'random' ? 'Random' : `${l.daysPerWeek || 1}x per week`}</span>
              </div>
              {l.frequencyType !== 'random' && (
              <div className="profile-field">
                <span className="profile-field-label">Game Days</span>
                <span className={`profile-field-value ${!(l.gameDays||[]).length ? 'empty' : ''}`}>{(l.gameDays||[]).length > 0 ? <div className="day-tags">{l.gameDays.map(d => <span key={d} className="day-tag">{d}</span>)}</div> : 'Not set'}</span>
              </div>
              )}
              <div className="profile-field">
                <span className="profile-field-label">Start Time</span>
                <span className="profile-field-value">{l.startTimeType === 'tbd' ? <span className="badge badge-yellow">TBD per game</span> : l.startTime ? (() => { const [h,m] = l.startTime.split(':'); const hr = Number(h); const ampm = hr >= 12 ? 'PM' : 'AM'; const h12 = hr % 12 || 12; return `${h12}:${m} ${ampm}`; })() : <span className="profile-field-value empty">Not set</span>}</span>
              </div>
              <div className="profile-field">
                <span className="profile-field-label">Team A</span>
                <span className="profile-field-value">{l.teamAName}</span>
              </div>
              <div className="profile-field">
                <span className="profile-field-label">Team B</span>
                <span className="profile-field-value">{l.teamBName}</span>
              </div>
              <div className="profile-field full">
                <span className="profile-field-label">Game Location</span>
                <span className={`profile-field-value ${!(l.address||l.location) ? 'empty' : ''}`}>{l.address || l.location || 'Not set'}</span>
              </div>
              {(l.gameNotes) && (
                <div className="profile-field full">
                  <span className="profile-field-label">Game Notes</span>
                  <span className="profile-field-value">{l.gameNotes}</span>
                </div>
              )}
            </div>
          </div>
          <div className="card">
            <div className="section-label" style={{marginBottom:14}}>Commissioners</div>
            {commishes.length > 0 ? (
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:20}}>
                {commishes.map(p => <span key={p.id} className="commish-badge" style={{fontSize:12,padding:'5px 12px'}}>{p.firstName} {p.lastName}</span>)}
              </div>
            ) : (
              <p style={{color:'var(--text-muted)',fontSize:13,fontStyle:'italic',marginBottom:20}}>No commissioners assigned</p>
            )}
            {ages.length > 0 && (
              <div>
                <div className="section-label" style={{marginBottom:14}}>Age Breakdown</div>
                <div className="profile-grid">
                  <div className="profile-field"><span className="profile-field-label">Average</span><span className="profile-field-value" style={{fontWeight:700,fontSize:22}}>{avgAge}</span></div>
                  <div className="profile-field"><span className="profile-field-label">Youngest</span><span className="profile-field-value" style={{fontWeight:700,fontSize:22}}>{youngestAge}</span></div>
                  <div className="profile-field"><span className="profile-field-label">Oldest</span><span className="profile-field-value" style={{fontWeight:700,fontSize:22}}>{oldestAge}</span></div>
                  <div className="profile-field"><span className="profile-field-label">With Birthday</span><span className="profile-field-value">{ages.length} of {lPlayers.length}</span></div>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Skill Distribution + Composite Rating */}
        {Object.keys(levelCounts).length > 0 && (() => {
          // Composite Rating: weighted score 0–100 (only rated players count, using per-league levels)
          const weights = { 'Pro':100, 'Game Changer':88, 'Advanced':75, 'Intermediate':50, 'Novice':25 };
          const ratedPlayers = lPlayers.filter(p => { const lv = getPlayerLeagueLevel(p); return lv && lv !== 'Not Rated'; });
          const totalWeighted = ratedPlayers.reduce((sum, p) => sum + (weights[getPlayerLeagueLevel(p)] || 0), 0);
          const compositeRaw = ratedPlayers.length > 0 ? totalWeighted / ratedPlayers.length : 0;
          const composite = compositeRaw.toFixed(1);
          const ratedPct = lPlayers.length > 0 ? ((ratedPlayers.length / lPlayers.length) * 100).toFixed(0) : 0;
          // Grade label
          const grade = compositeRaw >= 90 ? 'Elite' : compositeRaw >= 75 ? 'Advanced' : compositeRaw >= 55 ? 'Competitive' : compositeRaw >= 30 ? 'Developing' : compositeRaw > 0 ? 'Novice' : 'Unrated';
          const gradeColor = compositeRaw >= 90 ? 'var(--brand)' : compositeRaw >= 75 ? 'var(--yellow)' : compositeRaw >= 55 ? 'var(--blue)' : compositeRaw >= 30 ? 'var(--green)' : 'var(--text-muted)';
          // Bar width
          const barPct = Math.min(100, compositeRaw);

          return (
            <div className="card" style={{marginTop:16}}>
              <div className="section-label" style={{marginBottom:14}}>Skill Distribution</div>
              <div style={{display:'flex',gap:24,flexWrap:'wrap',marginBottom:24}}>
                {['Pro','Game Changer','Advanced','Intermediate','Novice','Not Rated'].filter(lv => levelCounts[lv]).map(lv => (
                  <div key={lv} style={{textAlign:'center'}}>
                    <div style={{fontSize:24,fontWeight:700,color:'var(--text-primary)'}}>{levelCounts[lv]}</div>
                    <div><span className={`badge ${levelBadgeCls[lv]}`}>{lv}</span></div>
                  </div>
                ))}
              </div>

              <div style={{borderTop:'1px solid var(--border)',paddingTop:20}}>
                <div className="section-label" style={{marginBottom:16}}>Composite Skill Rating</div>
                <div style={{display:'flex',alignItems:'flex-end',gap:16,flexWrap:'wrap'}}>
                  <div>
                    <div style={{fontSize:48,fontWeight:800,letterSpacing:'-0.04em',lineHeight:1,color:'var(--text-primary)'}}>{composite}</div>
                    <div style={{fontSize:12,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:gradeColor,marginTop:4}}>{grade}</div>
                  </div>
                  <div style={{flex:1,minWidth:200}}>
                    {/* Rating bar */}
                    <div style={{height:8,borderRadius:4,background:'var(--bg-subtle)',overflow:'hidden',marginBottom:10}}>
                      <div style={{height:'100%',borderRadius:4,width:`${barPct}%`,background:gradeColor,transition:'width 0.3s ease'}}/>
                    </div>
                    <div className="profile-grid" style={{gap:10}}>
                      <div className="profile-field">
                        <span className="profile-field-label">Rated Players</span>
                        <span className="profile-field-value">{ratedPlayers.length} of {lPlayers.length} ({ratedPct}%)</span>
                      </div>
                      <div className="profile-field">
                        <span className="profile-field-label">Formula</span>
                        <span className="profile-field-value" style={{fontSize:11,color:'var(--text-muted)'}}>Pro=100, GC=88, Adv=75, Int=50, Nov=25 (NR excluded)</span>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Per-team composite */}
                {(teamA.length > 0 || teamB.length > 0) && (() => {
                  const teamScore = (players) => {
                    const rated = players.filter(p => { const lv = getPlayerLeagueLevel(p); return lv && lv !== 'Not Rated'; });
                    if (!rated.length) return null;
                    return (rated.reduce((s,p) => s + (weights[getPlayerLeagueLevel(p)]||0), 0) / rated.length).toFixed(1);
                  };
                  const aScore = teamScore(teamA);
                  const bScore = teamScore(teamB);
                  const sScore = teamScore(swing);
                  return (
                    <div style={{display:'flex',gap:16,marginTop:16,flexWrap:'wrap'}}>
                      {aScore !== null && (
                        <div style={{flex:1,minWidth:120,background:'var(--bg-subtle)',borderRadius:8,padding:14,textAlign:'center',borderLeft:'3px solid var(--blue)'}}>
                          <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>{l.teamAName}</div>
                          <div style={{fontSize:24,fontWeight:800,color:'var(--text-primary)'}}>{aScore}</div>
                        </div>
                      )}
                      {bScore !== null && (
                        <div style={{flex:1,minWidth:120,background:'var(--bg-subtle)',borderRadius:8,padding:14,textAlign:'center',borderLeft:'3px solid var(--green)'}}>
                          <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>{l.teamBName}</div>
                          <div style={{fontSize:24,fontWeight:800,color:'var(--text-primary)'}}>{bScore}</div>
                        </div>
                      )}
                      {sScore !== null && swing.length > 0 && (
                        <div style={{flex:1,minWidth:120,background:'var(--bg-subtle)',borderRadius:8,padding:14,textAlign:'center',borderLeft:'3px solid var(--yellow)'}}>
                          <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Swing</div>
                          <div style={{fontSize:24,fontWeight:800,color:'var(--text-primary)'}}>{sScore}</div>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            </div>
          );
        })()}

        {/* Injury Report */}
        {(() => {
          const activePlayers = lPlayers.filter(p => (p.status || 'Active') === 'Active');
          const inactivePlayers = lPlayers.filter(p => p.status === 'Inactive');
          const irPlayers = lPlayers.filter(p => p.status === 'IR');
          const fmtDt = (dt) => { if (!dt) return ''; return new Date(dt+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
          return (irPlayers.length > 0 || inactivePlayers.length > 0) ? (
            <div className="card" style={{marginTop:16}}>
              <div className="section-label" style={{marginBottom:14}}>Injury &amp; Availability Report</div>
              <div style={{display:'flex',gap:16,marginBottom:20,flexWrap:'wrap'}}>
                <div style={{textAlign:'center'}}><div style={{fontSize:24,fontWeight:700,color:'var(--green)'}}>{activePlayers.length}</div><div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Active</div></div>
                <div style={{textAlign:'center'}}><div style={{fontSize:24,fontWeight:700,color:'var(--yellow)'}}>{inactivePlayers.length}</div><div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Inactive</div></div>
                <div style={{textAlign:'center'}}><div style={{fontSize:24,fontWeight:700,color:'var(--red)'}}>{irPlayers.length}</div><div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Injured Reserve</div></div>
              </div>
              {irPlayers.length > 0 && (
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--red)',marginBottom:8}}>Injured Reserve</div>
                  <div className="table-wrap"><table>
                    <thead><tr><th>Player</th><th>Team</th><th>Location</th><th>Detail</th><th>Expected Return</th></tr></thead>
                    <tbody>{irPlayers.map(p => {
                      const tm = (p.leagueTeams||{})[l.id] || 'Swing';
                      const tmLabel = tm === 'A' ? l.teamAName : tm === 'B' ? l.teamBName : 'Swing';
                      return <tr key={p.id}><td><strong>{p.lastName}, {p.firstName}</strong></td><td>{tmLabel}</td><td>{p.injuryLocation || '—'}</td><td>{p.statusNote || '—'}</td><td>{p.statusIndefinite ? 'Indefinite' : p.statusDate ? fmtDt(p.statusDate) : 'TBD'}</td></tr>;
                    })}</tbody>
                  </table></div>
                </div>
              )}
              {inactivePlayers.length > 0 && (
                <div>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--yellow)',marginBottom:8}}>Inactive</div>
                  <div className="table-wrap"><table>
                    <thead><tr><th>Player</th><th>Team</th><th>Reason</th><th>Return Date</th></tr></thead>
                    <tbody>{inactivePlayers.map(p => {
                      const tm = (p.leagueTeams||{})[l.id] || 'Swing';
                      const tmLabel = tm === 'A' ? l.teamAName : tm === 'B' ? l.teamBName : 'Swing';
                      return <tr key={p.id}><td><strong>{p.lastName}, {p.firstName}</strong></td><td>{tmLabel}</td><td>{p.statusNote || '—'}</td><td>{p.statusIndefinite ? 'Indefinite' : p.statusDate ? fmtDt(p.statusDate) : 'TBD'}</td></tr>;
                    })}</tbody>
                  </table></div>
                </div>
              )}
            </div>
          ) : null;
        })()}

        {/* Team Rosters */}
        <div className="card" style={{marginTop:16}}>
          <div className="section-label" style={{marginBottom:14}}>Rosters ({lPlayers.length} players)</div>
          {lPlayers.length > 0 ? (
            <div>
              {renderTeamTable(teamA, l.teamAName || 'Team A', 'var(--blue)')}
              {renderTeamTable(teamB, l.teamBName || 'Team B', 'var(--green)')}
              {swing.length > 0 && renderTeamTable(swing, 'Swing Players', 'var(--yellow)')}
            </div>
          ) : (
            <p className="profile-field-value empty">No players assigned</p>
          )}
        </div>

        {/* Upcoming Games */}
        {upcomingGames.length > 0 && (
          <div className="card" style={{marginTop:16}}>
            <div className="section-label" style={{marginBottom:14}}>Upcoming Games {gameYear !== 'all' ? gameYear : ''}</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>Matchup</th><th>Format</th><th>Status</th></tr></thead>
                <tbody>
                  {upcomingGames.map(g => (
                    <tr key={g.id}>
                      <td>{fmtGameDate(g.gameDate)} <span style={{color:'var(--text-muted)'}}>@ {fmtTime(g.gameTime)}</span></td>
                      <td><strong>{g.teamAName}</strong> vs <strong>{g.teamBName}</strong></td>
                      <td><span className="badge badge-brand">{g.format?.replace('-series','') || '5v5'}</span></td>
                      <td><span className={`badge ${g.locked ? 'badge-green' : 'badge-yellow'}`}>{g.locked ? 'Locked' : 'Open'}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Game History */}
        {completedGames.length > 0 && (
          <div className="card" style={{marginTop:16}}>
            <div className="section-label" style={{marginBottom:14}}>Game History {gameYear !== 'all' ? gameYear : ''}</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>Matchup</th><th>Score</th><th style={{textAlign:'right'}}>+/-</th><th>Winner</th><th>Game Winner</th></tr></thead>
                <tbody>
                  {completedGames.slice().reverse().map(g => {
                    const wt = getGameWinTeam(g); const w = wt === 'A' ? g.teamAName : wt === 'B' ? g.teamBName : 'Tie';
                    const gw = g.gameWinner ? roster.find(p => p.id === g.gameWinner) : null;
                    const hs = g.scoreA !== null && g.scoreB !== null;
                    const diff = hs ? Math.abs(g.scoreA - g.scoreB) : null;
                    return (
                      <tr key={g.id}>
                        <td>{fmtGameDate(g.gameDate)}</td>
                        <td><strong style={{cursor:'pointer',color:'var(--brand)'}} onClick={() => onViewGame && onViewGame(g.id)}>{g.teamAName} vs {g.teamBName}</strong></td>
                        <td>{hs ? <strong>{g.scoreA} — {g.scoreB}</strong> : <span className="badge badge-green">{w} W</span>}</td>
                        <td style={{textAlign:'right',fontWeight:700}}>{diff !== null ? diff : '—'}</td>
                        <td><span className="badge badge-green">{w}</span></td>
                        <td>{gw ? <span style={{display:'inline-flex',alignItems:'center',gap:4}}><span style={{width:18,height:18,borderRadius:'50%',background:'var(--brand)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:800,color:'#fff'}}>{(gw.firstName?.[0]||'')+(gw.lastName?.[0]||'')}</span><span style={{fontSize:12,fontWeight:600}}>{gw.firstName} {gw.lastName[0]}.</span><span className="badge badge-brand" style={{fontSize:8,padding:'1px 5px'}}>GW</span></span> : <span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Modals still need to work from this view */}
        {manageCommish && (() => {
          const lg = leagues.find(ll => ll.id === manageCommish);
          if (!lg) return null;
          const cm = getCommishNames(lg.commissioners);
          const lp = (roster || []).filter(p => (p.leagueIds || []).includes(lg.id));
          const avail = lp.filter(p => !(lg.commissioners || []).includes(p.id));
          return (
            <div className="modal-overlay" onClick={() => setManageCommish(null)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <button className="modal-close" onClick={() => setManageCommish(null)}>&#x2715;</button>
                <h2>Commissioners — {lg.name}</h2>
                <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:16}}>Commissioners have full admin privileges for this league.</p>
                {cm.length === 0 ? <p style={{color:'var(--text-muted)',fontSize:13,fontStyle:'italic',marginBottom:16}}>No commissioners assigned yet.</p> : (
                  <div className="commish-list">{cm.map(p => (
                    <div key={p.id} className="commish-row"><div><span className="name">{p.firstName} {p.lastName}</span><span className="role" style={{marginLeft:8}}>Commissioner</span></div><button className="btn btn-danger btn-small" onClick={() => removeCommissioner(lg.id, p.id)}>Remove</button></div>
                  ))}</div>
                )}
                {avail.length > 0 && <div className="commish-add-row"><select value={addCommishId} onChange={e => setAddCommishId(e.target.value)}><option value="">Select player to add...</option>{avail.sort((a,b) => a.lastName.localeCompare(b.lastName)).map(p => <option key={p.id} value={p.id}>{p.lastName}, {p.firstName}</option>)}</select><button className="btn btn-primary btn-small" onClick={() => addCommissioner(lg.id, addCommishId)}>Add</button></div>}
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  // ---- LEAGUE CREATE/EDIT FULL PAGE ----
  if (showForm) {
    return (
      <div>
        <button className="btn btn-secondary btn-small" onClick={() => setShowForm(false)} style={{marginBottom:20}}>&#8592; Back to Leagues</button>
        <div className="card" style={{marginBottom:20}}>
          <h2 style={{margin:0,fontSize:20,fontWeight:700,letterSpacing:'-0.03em'}}>{editId ? 'Edit League' : 'Create League'}</h2>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {/* Left: League Info */}
          <div className="card">
            <div className="section-label" style={{marginBottom:14}}>League Info</div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div className="form-group"><label>League Name *</label><input value={form.name} onChange={e => setForm({...form, name:e.target.value})} placeholder="BDL Wednesday League" /></div>
              <div className="form-group"><label>League Access</label>
                <select value={form.leagueType || 'closed'} onChange={e => setForm({...form, leagueType:e.target.value})}>
                  <option value="closed">Private — Invite Only</option>
                  <option value="open">Open — Anyone Can Join</option>
                </select>
                <span style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>{form.leagueType === 'open' ? 'Any player in the roster can join this league.' : 'Only commissioners can add players to this league.'}</span>
              </div>
              <div className="form-group"><label>League Level</label>
                <select value={form.level} onChange={e => setForm({...form, level:e.target.value})}>
                  {leagueLevels.map(l => <option key={l} value={l}>{l}</option>)}
                </select>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="form-group"><label>Team A Name</label><input value={form.teamAName} onChange={e => setForm({...form, teamAName:e.target.value})} /></div>
                <div className="form-group"><label>Team B Name</label><input value={form.teamBName} onChange={e => setForm({...form, teamBName:e.target.value})} /></div>
              </div>
              <div className="form-group"><label>Format</label>
                <select value={form.format} onChange={e => setForm({...form, format:e.target.value})}>
                  {FORMAT_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
              </div>
              {isSeries(form.format) && (
                <div className="form-group"><label>Series Length</label>
                  <select value={form.seriesBestOf || 3} onChange={e => setForm({...form, seriesBestOf:Number(e.target.value)})}>
                    {SERIES_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                  <span style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>First to {Math.ceil((form.seriesBestOf||3)/2)} wins takes the series.</span>
                </div>
              )}
            </div>
          </div>

          {/* Right: Schedule + Location */}
          <div className="card">
            <div className="section-label" style={{marginBottom:14}}>Schedule &amp; Location</div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div className="form-group"><label>Frequency</label>
                <select value={form.frequencyType || 'scheduled'} onChange={e => setForm({...form, frequencyType: e.target.value})}>
                  <option value="scheduled">Scheduled</option>
                  <option value="random">Random</option>
                </select>
              </div>
              {(form.frequencyType || 'scheduled') === 'scheduled' && (
                <div className="form-group"><label>Days Per Week</label>
                  <select value={form.daysPerWeek} onChange={e => { const n = Number(e.target.value); setForm({...form, daysPerWeek: n, gameDays: (form.gameDays||[]).slice(0, n)}); }}>
                    {[1,2,3,4,5].map(n => <option key={n} value={n}>{n} day{n>1?'s':''} per week</option>)}

// ============= ADMIN SETTINGS ==============
function AdminSettings({ roster, showToast }) {
  const [superAdmins, setSuperAdmins] = useState(load('superAdmins', []));
  const [addId, setAddId] = useState('');
  const [addUsername, setAddUsername] = useState('');
  const [confirmRemove, setConfirmRemove] = useState(null);

  const saveSA = (list) => { setSuperAdmins(list); save('superAdmins', list); };

  const addSuperAdmin = () => {
    if (!addId || !addUsername.trim()) { showToast('Select a player and enter a username.'); return; }
    const un = addUsername.trim().toLowerCase();
    if (superAdmins.find(a => a.username === un)) { showToast('Username already exists.'); return; }
    const player = roster.find(p => p.id === addId);
    if (!player) return;
    saveSA([...superAdmins, { username: un, playerId: player.id, role: 'super_admin' }]);
    setAddId(''); setAddUsername('');
    showToast(`${player.firstName} ${player.lastName} added as Super Admin.`);
  };

  const removeSuperAdmin = (username) => {
    const a = superAdmins.find(sa => sa.username === username);
    if (a && a.role === 'owner') { showToast('Cannot remove the owner.'); return; }
    saveSA(superAdmins.filter(sa => sa.username !== username));
    setConfirmRemove(null);
    showToast('Super Admin removed.');
  };

  const getPlayer = (id) => roster.find(p => p.id === id);
  const assignedIds = superAdmins.map(a => a.playerId).filter(Boolean);
  const availablePlayers = roster.filter(p => !assignedIds.includes(p.id)).sort((a,b) => a.lastName.localeCompare(b.lastName));

  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.03em',marginBottom:20}}>Settings</h2>

      <div className="card">
        <div className="section-label" style={{marginBottom:14}}>Super Admins</div>
        <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:16}}>Super Admins have full access to all features: Roster, Leagues, Games, and Settings. Owners cannot be removed.</p>

        <div className="table-wrap" style={{marginBottom:20}}>
          <table>
            <thead><tr><th>Username</th><th>Player</th><th>Role</th><th>Actions</th></tr></thead>
            <tbody>
              {superAdmins.map(a => {
                const p = a.playerId ? getPlayer(a.playerId) : null;
                return (
                  <tr key={a.username}>
                    <td><strong>{a.username}</strong></td>
                    <td>{p ? `${p.firstName} ${p.lastName}` : <span style={{color:'var(--text-muted)'}}>Not linked</span>}</td>
                    <td>{a.role === 'owner' ? <span className="badge badge-brand">Owner</span> : <span className="badge badge-blue">Super Admin</span>}</td>
                    <td>{a.role === 'owner' ? <span style={{color:'var(--text-muted)',fontSize:11}}>Protected</span> : <button className="btn btn-danger btn-small" onClick={() => setConfirmRemove(a.username)}>Remove</button>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div className="section-label" style={{marginBottom:12}}>Add Super Admin</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div className="form-group" style={{flex:1,minWidth:180}}>
            <label>Player</label>
            <select value={addId} onChange={e => {
              setAddId(e.target.value);
              if (e.target.value) {
                const p = roster.find(r => r.id === e.target.value);
                if (p) setAddUsername(p.firstName.toLowerCase());
              }
            }}>
              <option value="">Select player...</option>
              {availablePlayers.map(p => <option key={p.id} value={p.id}>{p.lastName}, {p.firstName}</option>)}
            </select>
          </div>
          <div className="form-group" style={{flex:1,minWidth:150}}>
            <label>Login Username</label>
            <input value={addUsername} onChange={e => setAddUsername(e.target.value)} placeholder="e.g. jake" />
          </div>
          <button className="btn btn-primary" onClick={addSuperAdmin}>Add Super Admin</button>
        </div>
        <p style={{color:'var(--text-muted)',fontSize:11,marginTop:10}}>All Super Admins use the shared password: bdl2026</p>
      </div>

      {confirmRemove && (
        <ConfirmModal
          title="Remove Super Admin"
          message={`Remove "${confirmRemove}" from Super Admins? They will lose all admin access.`}
          confirmLabel="Remove"
          onConfirm={() => removeSuperAdmin(confirmRemove)}
          onCancel={() => setConfirmRemove(null)}
        />
      )}
    </div>
  );
}

// ============= INVITE PLAYER MODAL ==============
function InvitePlayerModal({ league, roster, setRoster, showToast, onClose }) {
  const [mode, setMode] = useState('choose'); // 'choose' | 'existing' | 'new' | 'sent'
  const [searchQ, setSearchQ] = useState('');
  const [invForm, setInvForm] = useState({ firstName:'', lastName:'', email:'', cell:'' });
  const [sentInvite, setSentInvite] = useState(null);
  const [copied, setCopied] = useState(false);

  // Add existing player from roster
  const addExisting = (player) => {
    if ((player.leagueIds||[]).includes(league.id)) { showToast('Already in this league.'); return; }
    const updated = roster.map(r => r.id !== player.id ? r : {
      ...r, leagueIds: [...(r.leagueIds||[]), league.id],
      leagueTeams: { ...(r.leagueTeams||{}), [league.id]: 'Swing' },
      leagueLevels: { ...(r.leagueLevels||{}), [league.id]: 'Not Rated' },
    });
    setRoster(updated);
    showToast(`${player.firstName} ${player.lastName} added to ${league.name}.`);
    onClose();
  };

  // Create new invite
  const sendNewInvite = () => {
    if (!invForm.firstName || !invForm.lastName) { showToast('First and last name required.'); return; }
    if (!invForm.email && !invForm.cell) { showToast('Email or cell required.'); return; }
    const inv = createInvite(league.id, league.name, invForm.firstName, invForm.lastName, invForm.email, invForm.cell, 'commissioner');
    setSentInvite(inv);
    setMode('sent');
  };

  const copyLink = () => {
    if (!sentInvite) return;
    const link = getInviteLink(sentInvite.id);
    navigator.clipboard.writeText(link).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }).catch(() => {});
  };

  const copyMessage = () => {
    if (!sentInvite) return;
    navigator.clipboard.writeText(getInviteMessage(sentInvite)).then(() => { showToast('Invite message copied!'); }).catch(() => {});
  };

                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>{existingPlayers.length} players available</div>
              </div>
              <div onClick={() => setMode('new')} style={{flex:1,padding:20,borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',textAlign:'center',transition:'all 0.15s'}} onMouseOver={e=>e.currentTarget.style.borderColor='var(--brand)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
                <div style={{fontSize:28,marginBottom:8}}>&#9993;</div>
                <div style={{fontSize:14,fontWeight:700}}>Invite New Player</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Send a signup link</div>

            <div style={{maxHeight:300,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8}}>
              {filteredExisting.length === 0 ? <p style={{padding:16,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No players found</p> : filteredExisting.sort((a,b) => a.lastName.localeCompare(b.lastName)).map(p => (
                <div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderBottom:'1px solid var(--border)'}}>

                    <div style={{fontSize:11,color:'var(--text-muted)'}}>{p.position || ''} {p.city ? `\u00b7 ${p.city}` : ''}</div>
                  </div>
                  <button className="btn btn-primary btn-small" onClick={() => addExisting(p)}>Add</button>
                </div>
              ))}
            </div>
            <div style={{marginTop:12}}><span className="login-link" onClick={() => setMode('choose')}>&#8592; Back</span></div>
          </div>
        )}

        {mode === 'new' && (
          <div>
            <h2 style={{marginBottom:12}}>Invite New Player</h2>
            <p style={{color:'var(--text-muted)',fontSize:12,marginBottom:16}}>Enter their info and we'll generate an invite link for {league.name}.</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <input placeholder="First Name *" value={invForm.firstName} onChange={e => setInvForm({...invForm, firstName:e.target.value})} />
              <input placeholder="Last Name *" value={invForm.lastName} onChange={e => setInvForm({...invForm, lastName:e.target.value})} />
            </div>
            <input placeholder="Email" type="email" value={invForm.email} onChange={e => setInvForm({...invForm, email:e.target.value})} style={{width:'100%',marginBottom:10}} />
            <input placeholder="Cell (555-555-5555)" value={invForm.cell} onChange={e => setInvForm({...invForm, cell:e.target.value})} style={{width:'100%',marginBottom:16}} />
            <button className="btn btn-primary" onClick={sendNewInvite}>Generate Invite Link</button>
            <div style={{marginTop:12}}><span className="login-link" onClick={() => setMode('choose')}>&#8592; Back</span></div>
          </div>
        )}

        {mode === 'sent' && sentInvite && (
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12}}>&#9989;</div>

            <div style={{background:'var(--bg-subtle)',border:'1px solid var(--border)',borderRadius:8,padding:14,marginBottom:16,wordBreak:'break-all',fontSize:12,textAlign:'left',color:'var(--text-primary)'}}>
              {getInviteLink(sentInvite.id)}

                <a href={`mailto:${sentInvite.email}?subject=You're invited to ${sentInvite.leagueName} on BDL Pickup&body=${encodeURIComponent(getInviteEmailBody(sentInvite))}`} className="btn btn-secondary btn-small" style={{textDecoration:'none'}}>Send Email</a>
              )}

            <div style={{background:'var(--bg-subtle)',borderRadius:8,padding:14,textAlign:'left',fontSize:12,color:'var(--text-muted)',whiteSpace:'pre-wrap'}}>{getInviteMessage(sentInvite)}</div>

              <button className="btn btn-secondary btn-small" onClick={() => { setMode('new'); setInvForm({firstName:'',lastName:'',email:'',cell:''}); setSentInvite(null); }}>Invite Another</button>
              <button className="btn btn-secondary btn-small" style={{marginLeft:8}} onClick={onClose}>Done</button>

}

// ============= LEADERBOARD ==============
function Leaderboard({ games, leagues, roster }) {
  const [lbYear, setLbYear] = useState(String(new Date().getFullYear()));
  const [leagueFilter, setLeagueFilter] = useState('all');

  const allYears = [...new Set(games.filter(g => g.gameDate).map(g => g.gameDate.slice(0,4)))].sort().reverse();
  const yearGames = lbYear === 'all' ? games : games.filter(g => g.gameDate && g.gameDate.startsWith(lbYear));
  const filtered = leagueFilter === 'all' ? yearGames : yearGames.filter(g => g.leagueId === leagueFilter || g.leagueName === (leagues.find(l => l.id === leagueFilter)||{}).name);
  const completed = filtered.filter(g => isGameComplete(g));

  // Build player stats
  const playerStats = {};
  roster.forEach(p => { playerStats[p.id] = { id:p.id, name:`${p.firstName} ${p.lastName}`, firstName:p.firstName, lastName:p.lastName, w:0, l:0, gp:0, gw:0 }; });

  completed.forEach(g => {
    const wt = getGameWinTeam(g);
    // Team-based W/L
    [...(g.teamA||[]), ...(g.teamB||[])].forEach(pid => {
      if (!playerStats[pid]) return;
      playerStats[pid].gp++;
      const onA = (g.teamA||[]).includes(pid);
      if ((onA && wt === 'A') || (!onA && wt === 'B')) playerStats[pid].w++;
      else if (wt && wt !== 'Tie') playerStats[pid].l++;
    });
    // Game Winner count
    if (g.gameWinner && playerStats[g.gameWinner]) {
      playerStats[g.gameWinner].gw++;
    }
  });

  // Also count GW for players not on game rosters (manual entries)
  completed.forEach(g => {
    if (g.gameWinner && playerStats[g.gameWinner] && playerStats[g.gameWinner].gp === 0) {
      // Player was GW but not on a team roster — still count the GW
    }
  });

  const allPlayers = Object.values(playerStats);
  const withGames = allPlayers.filter(p => p.gp > 0);

  // Leaderboards
  const topWins = withGames.slice().sort((a,b) => b.w - a.w || a.gp - b.gp).slice(0,10);
  const topWinPct = withGames.filter(p => p.gp >= 3).slice().sort((a,b) => (b.w/b.gp) - (a.w/a.gp) || b.w - a.w).slice(0,10);
  const topGW = allPlayers.filter(p => p.gw > 0).slice().sort((a,b) => b.gw - a.gw || a.gp - b.gp).slice(0,10);
  const topLosses = withGames.slice().sort((a,b) => b.l - a.l || b.gp - a.gp).slice(0,10);
  const lowWinPct = withGames.filter(p => p.gp >= 3).slice().sort((a,b) => (a.w/a.gp) - (b.w/b.gp) || b.l - a.l).slice(0,10);

  const renderBoard = (title, players, columns, emptyMsg) => (
    <div className="card" style={{flex:1,minWidth:300}}>
      <div className="section-label" style={{marginBottom:14}}>{title}</div>
      {players.length === 0 ? <p style={{color:'var(--text-muted)',fontSize:13,fontStyle:'italic'}}>{emptyMsg || 'No data'}</p> : (
        <div className="table-wrap"><table>
          <thead><tr>{columns.map(c => <th key={c.key} style={{textAlign:c.align||'left'}}>{c.label}</th>)}</tr></thead>
          <tbody>
            {players.map((p,i) => (
              <tr key={p.id}>
                {columns.map(c => <td key={c.key} style={{textAlign:c.align||'left',...(c.style?.(p,i)||{})}}>{c.render(p,i)}</td>)}
              </tr>
            ))}
          </tbody>
        </table></div>
      )}
    </div>
  );

  const totalGames = completed.length;
  const rankCol = {key:'rank',label:'#',render:(_,i)=>i+1,style:()=>({fontWeight:700,color:'var(--text-muted)',width:30})};
  const nameCol = {key:'name',label:'Player',render:(p)=><strong>{p.lastName}, {p.firstName}</strong>};
  const gpCol = {key:'gp',label:'GP',align:'right',render:(p)=>p.gp};
  const playedPctCol = {key:'ppct',label:'% Played',align:'right',render:(p)=>totalGames>0?((p.gp/totalGames*100).toFixed(0)+'%'):'—',style:()=>({fontWeight:600,color:'var(--text-muted)'})};

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.03em',margin:0}}>Leaderboard</h2>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20,alignItems:'center'}}>
        <select value={leagueFilter} onChange={e => setLeagueFilter(e.target.value)} style={{minWidth:180}}>
          <option value="all">All Leagues</option>
          {leagues.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
        </select>
        <div style={{display:'flex',gap:4}}>
          <button type="button" onClick={() => setLbYear('all')} style={{padding:'6px 14px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',cursor:'pointer',border:'1px solid var(--border)',fontFamily:'inherit',transition:'all 0.15s',background:lbYear==='all'?'var(--brand)':'var(--surface)',color:lbYear==='all'?'#fff':'var(--text-muted)',borderColor:lbYear==='all'?'var(--brand)':'var(--border)'}}>All Time</button>
          {(allYears.length > 0 ? allYears : [String(new Date().getFullYear())]).map(y => (
            <button key={y} type="button" onClick={() => setLbYear(y)} style={{padding:'6px 14px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:'0.04em',cursor:'pointer',border:'1px solid var(--border)',fontFamily:'inherit',transition:'all 0.15s',background:lbYear===y?'var(--brand)':'var(--surface)',color:lbYear===y?'#fff':'var(--text-muted)',borderColor:lbYear===y?'var(--brand)':'var(--border)'}}>{y}</button>
          ))}
        </div>
      </div>

      {/* Summary */}
      <div className="stat-grid" style={{marginBottom:20}}>
        <div className="stat-card"><div className="num">{completed.length}</div><div className="label">Games</div></div>
        <div className="stat-card"><div className="num">{withGames.length}</div><div className="label">Players</div></div>
        <div className="stat-card"><div className="num">{topGW.length > 0 ? topGW[0].gw : 0}</div><div className="label">Most GW Awards</div></div>
      </div>

      {/* Top row: Most Wins + Highest Win% */}
      <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:16}}>
        {renderBoard('Most Wins', topWins, [
          rankCol, nameCol, gpCol, playedPctCol,
          {key:'w',label:'W',align:'right',render:(p)=>p.w,style:(p)=>({fontWeight:700,color:'var(--green)'})},
          {key:'l',label:'L',align:'right',render:(p)=>p.l,style:(p)=>({color:'var(--red)'})},
          {key:'pct',label:'Win%',align:'right',render:(p)=>(p.gp>0?(p.w/p.gp*100).toFixed(0):'0')+'%',style:(p)=>({fontWeight:700})},
        ], 'No games played yet.')}

        {renderBoard('Highest Win %', topWinPct, [
          rankCol, nameCol, gpCol, playedPctCol,
          {key:'pct',label:'Win%',align:'right',render:(p)=>(p.gp>0?(p.w/p.gp*100).toFixed(1):'0.0')+'%',style:(p)=>({fontWeight:800,fontSize:16,color:'var(--green)'})},
          {key:'w',label:'W',align:'right',render:(p)=>p.w},
          {key:'l',label:'L',align:'right',render:(p)=>p.l},
        ], 'Min 3 games required.')}
      </div>

      {/* Game Winner Leaderboard */}
      <div style={{marginBottom:16}}>
        {renderBoard('Game Winner Awards', topGW, [
          rankCol, nameCol, gpCol, playedPctCol,
          {key:'gw',label:'GW',align:'right',render:(p)=>p.gw,style:(p)=>({fontWeight:800,fontSize:18,color:'var(--brand)'})},
          {key:'rate',label:'GW Rate',align:'right',render:(p)=>p.gp>0?((p.gw/p.gp*100).toFixed(0)+'%'):'—',style:()=>({fontWeight:600})},
        ], 'No game winners awarded yet.')}
      </div>

      {/* Bottom row: Most Losses + Lowest Win% */}
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        {renderBoard('Most Losses', topLosses, [
          rankCol, nameCol, gpCol, playedPctCol,
          {key:'l',label:'L',align:'right',render:(p)=>p.l,style:(p)=>({fontWeight:700,color:'var(--red)'})},
          {key:'w',label:'W',align:'right',render:(p)=>p.w,style:(p)=>({color:'var(--green)'})},
          {key:'pct',label:'Win%',align:'right',render:(p)=>(p.gp>0?(p.w/p.gp*100).toFixed(0):'0')+'%'},
        ], 'No games played yet.')}

        {renderBoard('Lowest Win %', lowWinPct, [
          rankCol, nameCol, gpCol, playedPctCol,
          {key:'pct',label:'Win%',align:'right',render:(p)=>(p.gp>0?(p.w/p.gp*100).toFixed(1):'0.0')+'%',style:(p)=>({fontWeight:800,fontSize:16,color:'var(--red)'})},
          {key:'w',label:'W',align:'right',render:(p)=>p.w},
          {key:'l',label:'L',align:'right',render:(p)=>p.l},
        ], 'Min 3 games required.')}
      </div>
    </div>
  );
}

// ============= STANDINGS PAGE (TAB) ==============
function StandingsPage({ games, leagues, onViewGame }) {
  const [standingsYear, setStandingsYear] = useState(String(new Date().getFullYear()));
  const [leagueFilter, setLeagueFilter] = useState('all');

  const allYears = [...new Set(games.filter(g => g.gameDate).map(g => g.gameDate.slice(0,4)))].sort().reverse();
  const yearFiltered = standingsYear === 'all' ? games : games.filter(g => g.gameDate && g.gameDate.startsWith(standingsYear));
  const leagueFiltered = leagueFilter === 'all' ? yearFiltered : yearFiltered.filter(g => g.leagueId === leagueFilter || g.leagueName === (leagues.find(l => l.id === leagueFilter)||{}).name);

  const completed = leagueFiltered.filter(g => isGameComplete(g));

  // Build standings
  const teamStats = {};
  completed.forEach(g => {
    const key = g.leagueName || 'Pickup';
    if (!teamStats[key]) teamStats[key] = {};
    const wt = getGameWinTeam(g);
    const hasScore = g.scoreA !== null && g.scoreB !== null;
    [['A',g.teamAName,g.scoreA,g.scoreB],['B',g.teamBName,g.scoreB,g.scoreA]].forEach(([side,name,pts,opp]) => {
      if (!teamStats[key][name]) teamStats[key][name] = { w:0, l:0, pf:0, pa:0, gp:0, streak:[] };
      teamStats[key][name].gp++;
      if (hasScore) { teamStats[key][name].pf += pts; teamStats[key][name].pa += opp; }
      if (wt === side) { teamStats[key][name].w++; teamStats[key][name].streak.push('W'); }
      else if (wt && wt !== 'Tie') { teamStats[key][name].l++; teamStats[key][name].streak.push('L'); }
      else { teamStats[key][name].streak.push('T'); }
    });
  });

  // Recent results for the filtered set
  const recentResults = completed.slice().sort((a,b) => (a.gameDate||'').localeCompare(b.gameDate||'')).slice(-5).reverse();

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.03em',margin:0}}>Standings</h2>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20,alignItems:'center'}}>
        <select value={leagueFilter} onChange={e => setLeagueFilter(e.target.value)} style={{minWidth:180}}>
          <option value="all">All Leagues</option>
          {leagues.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
        </select>
        <div style={{display:'flex',gap:4}}>
          <button type="button" onClick={() => setStandingsYear('all')} style={{padding:'6px 14px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',cursor:'pointer',border:'1px solid var(--border)',fontFamily:'inherit',transition:'all 0.15s',background:standingsYear==='all'?'var(--brand)':'var(--surface)',color:standingsYear==='all'?'#fff':'var(--text-muted)',borderColor:standingsYear==='all'?'var(--brand)':'var(--border)'}}>All Time</button>
          {(allYears.length > 0 ? allYears : [String(new Date().getFullYear())]).map(y => (
            <button key={y} type="button" onClick={() => setStandingsYear(y)} style={{padding:'6px 14px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:'0.04em',cursor:'pointer',border:'1px solid var(--border)',fontFamily:'inherit',transition:'all 0.15s',background:standingsYear===y?'var(--brand)':'var(--surface)',color:standingsYear===y?'#fff':'var(--text-muted)',borderColor:standingsYear===y?'var(--brand)':'var(--border)'}}>{y}</button>
          ))}
        </div>
      </div>

      {/* Stat summary */}
      {(() => {
        const scoredGames = completed.filter(g => g.scoreA !== null && g.scoreB !== null);
        const totalDiff = scoredGames.reduce((s,g) => s + Math.abs(g.scoreA - g.scoreB), 0);
        const avgDiff = scoredGames.length > 0 ? (totalDiff / scoredGames.length).toFixed(1) : null;
        return (
          <div className="stat-grid" style={{marginBottom:20}}>
            <div className="stat-card"><div className="num">{completed.length}</div><div className="label">Games Completed</div></div>
            <div className="stat-card"><div className="num">{Object.keys(teamStats).length}</div><div className="label">Leagues</div></div>
            {avgDiff && <div className="stat-card"><div className="num">{avgDiff}</div><div className="label">Avg +/-</div></div>}
          </div>
        );
      })()}

      {/* Standings Tables */}
      {Object.keys(teamStats).length === 0 ? (
        <div className="card"><div className="empty"><p>No completed games for this period.</p></div></div>
      ) : (
        Object.entries(teamStats).map(([league, teams]) => (
          <div key={league} className="card" style={{marginBottom:16}}>
            <div className="section-label" style={{marginBottom:14}}>{league}</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Team</th><th style={{textAlign:'right'}}>GP</th><th style={{textAlign:'right'}}>W</th><th style={{textAlign:'right'}}>L</th><th style={{textAlign:'right'}}>Win%</th><th style={{textAlign:'right'}}>PF</th><th style={{textAlign:'right'}}>PA</th><th style={{textAlign:'right'}}>+/-</th><th style={{textAlign:'right'}}>Avg +/-</th><th>Streak</th></tr></thead>
                <tbody>
                  {Object.entries(teams).sort((a,b) => b[1].w - a[1].w || a[1].l - b[1].l).map(([name, s]) => {
                    const total = s.w + s.l;
                    const pct = total > 0 ? (s.w / total * 100).toFixed(0) : '0';
                    const diff = s.pf - s.pa;
                    const avgPM = s.gp > 0 ? (diff / s.gp).toFixed(1) : '0.0';
                    // Current streak
                    const streakArr = s.streak.slice().reverse();
                    let streakCount = 0; const streakType = streakArr[0] || '';
                    for (const r of streakArr) { if (r === streakType) streakCount++; else break; }
                    const streakLabel = streakType && streakCount > 0 ? `${streakType}${streakCount}` : '—';
                    const streakColor = streakType === 'W' ? 'var(--green)' : streakType === 'L' ? 'var(--red)' : 'var(--text-muted)';
                    return (
                      <tr key={name}>
                        <td><strong>{name}</strong></td>
                        <td style={{textAlign:'right'}}>{s.gp}</td>
                        <td style={{textAlign:'right',color:'var(--green)',fontWeight:700}}>{s.w}</td>
                        <td style={{textAlign:'right',color:'var(--red)',fontWeight:700}}>{s.l}</td>
                        <td style={{textAlign:'right'}}>{pct}%</td>
                        <td style={{textAlign:'right'}}>{s.pf}</td>
                        <td style={{textAlign:'right'}}>{s.pa}</td>
                        <td style={{textAlign:'right',fontWeight:700,color: diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--text-muted)'}}>{diff > 0 ? '+' : ''}{diff}</td>
                        <td style={{textAlign:'right',fontWeight:700,color: Number(avgPM) > 0 ? 'var(--green)' : Number(avgPM) < 0 ? 'var(--red)' : 'var(--text-muted)'}}>{Number(avgPM) > 0 ? '+' : ''}{avgPM}</td>
                        <td><span style={{fontWeight:700,fontSize:12,color:streakColor}}>{streakLabel}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        ))
      )}

      {/* Recent Results */}
      {recentResults.length > 0 && (
        <div className="card" style={{marginTop:8}}>
          <div className="section-label" style={{marginBottom:14}}>Recent Results</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Date</th><th>League</th><th>Matchup</th><th>Score</th><th style={{textAlign:'right'}}>+/-</th><th>Winner</th></tr></thead>
              <tbody>
                {recentResults.map(g => {
                  const wt = getGameWinTeam(g); const w = wt === 'A' ? g.teamAName : wt === 'B' ? g.teamBName : 'Tie';
                  const hs = g.scoreA !== null && g.scoreB !== null;
                  const diff = hs ? Math.abs(g.scoreA - g.scoreB) : null;
                  return (
                    <tr key={g.id}>
                      <td>{fmtGameDate(g.gameDate)}</td>
                      <td>{g.leagueName || 'Pickup'}</td>
                      <td><strong style={{cursor:'pointer',color:'var(--brand)'}} onClick={() => onViewGame && onViewGame(g.id)}>{g.teamAName} vs {g.teamBName}</strong></td>
                      <td>{hs ? <strong>{g.scoreA} — {g.scoreB}</strong> : <span className="badge badge-green">{w} W</span>}</td>
                      <td style={{textAlign:'right',fontWeight:700}}>{diff !== null ? diff : '—'}</td>
                      <td><span className="badge badge-green">{w}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

                  </select>
                </div>
              )}
              {(form.frequencyType || 'scheduled') === 'scheduled' && (
                <div className="form-group">
                  <label>Game Days <span style={{fontWeight:400,textTransform:'none',letterSpacing:0}}>(select {form.daysPerWeek})</span></label>
                  <div className="day-picker">
                    {allDays.map(d => (
                      <button key={d} type="button" className={`day-btn ${(form.gameDays||[]).includes(d) ? 'selected' : ''}`} onClick={() => toggleDay(d)}>{d}</button>
                    ))}
                  </div>
                </div>
              )}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="form-group"><label>Start Time</label>
                  <select value={form.startTimeType || 'fixed'} onChange={e => setForm({...form, startTimeType:e.target.value, startTime: e.target.value === 'tbd' ? '' : form.startTime})}>
                    <option value="fixed">Fixed Time</option>
                    <option value="tbd">TBD (Set Per Game)</option>
                  </select>
                </div>
                {(form.startTimeType || 'fixed') === 'fixed' && (
                  <div className="form-group"><label>Game Time</label>
                    <input type="time" value={form.startTime || ''} onChange={e => setForm({...form, startTime:e.target.value})} />
                  </div>
                )}
              </div>
              <div className="form-group"><label>Game Location Address</label><input value={form.address || ''} onChange={e => setForm({...form, address:e.target.value})} placeholder="e.g. 123 Main St, Nashville, TN 37201" /></div>
              <div className="form-group"><label>Game Notes</label><input value={form.gameNotes || ''} onChange={e => setForm({...form, gameNotes:e.target.value})} placeholder="e.g. Court 3, bring dark and white jerseys" /></div>
              <div className="form-group">
                <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                  <input type="checkbox" checked={form.bettingLineEnabled||false} onChange={e => setForm({...form, bettingLineEnabled:e.target.checked})} style={{width:16,height:16,margin:0}} />
                  <span>Enable BDL Betting Line</span>
                </label>
                <span style={{fontSize:10,color:'var(--text-muted)',marginTop:3}}>Show projected odds, spread, and O/U for upcoming games based on player history.</span>
              </div>
            </div>
          </div>
        </div>

        {/* Assign Players */}
        {roster && roster.length > 0 && (
          <div className="card" style={{marginTop:16}}>
            <div className="section-label" style={{marginBottom:14}}>Assign Players <span style={{fontWeight:400,textTransform:'none',letterSpacing:0}}>({selectedPlayers.length} selected)</span></div>
            <input placeholder="Search players..." value={playerSearch} onChange={e => setPlayerSearch(e.target.value)} style={{marginBottom:10,maxWidth:350}} />
            <div style={{maxHeight:400,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,background:'var(--input-bg)'}}>
              {(() => {
                const q = playerSearch.toLowerCase();
                const filtered = roster.filter(p => !q || `${p.firstName} ${p.lastName}`.toLowerCase().includes(q)).sort((a,b) => {
                  const aS = selectedPlayers.includes(a.id) ? 0 : 1;
                  const bS = selectedPlayers.includes(b.id) ? 0 : 1;
                  if (aS !== bS) return aS - bS;
                  return a.lastName.localeCompare(b.lastName);
                });
                return filtered.map(p => {
                  const checked = selectedPlayers.includes(p.id);
                  const pTeam = playerTeams[p.id] || 'Swing';
                  const pLvl = playerLevels[p.id] || 'Not Rated';
                  return (
                    <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderBottom:'1px solid var(--border)',background:checked?'var(--brand-bg)':'transparent',transition:'background 0.1s'}}>
                      <span style={{width:18,height:18,borderRadius:4,border:checked?'none':'1.5px solid var(--text-muted)',background:checked?'var(--brand)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}} onClick={() => togglePlayer(p.id)}>
                        {checked && <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1.5 5.5 4 8 8.5 2.5"/></svg>}
                      </span>
                      <span style={{fontSize:13,fontWeight:600,color:'var(--text-primary)',cursor:'pointer',flex:1}} onClick={() => togglePlayer(p.id)}>{p.lastName}, {p.firstName}</span>
                      {checked && (
                        <div style={{display:'flex',gap:8,alignItems:'center'}}>
                          <select value={pLvl} onChange={e => setPlayerLevels({...playerLevels, [p.id]:e.target.value})} style={{padding:'4px 8px',fontSize:11,fontWeight:600,borderRadius:4,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text-primary)',fontFamily:'inherit'}} onClick={e => e.stopPropagation()}>
                            {['Not Rated','Novice','Intermediate','Advanced','Game Changer','Pro'].map(lv => <option key={lv} value={lv}>{lv}</option>)}
                          </select>
                          <div style={{display:'flex',gap:3}}>
                            {[{v:'A',l:form.teamAName||'Team A',c:'var(--blue)'},{v:'B',l:form.teamBName||'Team B',c:'var(--green)'},{v:'Swing',l:'Swing',c:'var(--yellow)'}].map(o => (
                              <button key={o.v} type="button" onClick={() => setPlayerTeams({...playerTeams, [p.id]:o.v})} style={{padding:'3px 10px',borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',cursor:'pointer',border:'none',fontFamily:'inherit',background:pTeam===o.v?o.c:'var(--surface)',color:pTeam===o.v?'#fff':'var(--text-muted)',transition:'all 0.1s'}}>{o.l}</button>
                            ))}
                          </div>
                        </div>
                      )}
                      {!checked && <span style={{fontSize:11,color:'var(--text-muted)'}}>{(p.leagueLevels||{})[editId] || 'Not Rated'}</span>}
                    </div>
                  );
                });
              })()}
            </div>
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button type="button" className="btn btn-secondary btn-small" onClick={() => setSelectedPlayers(roster.map(p => p.id))}>Select All</button>
              <button type="button" className="btn btn-secondary btn-small" onClick={() => setSelectedPlayers([])}>Clear All</button>
            </div>
          </div>
        )}

        {/* Save */}
        <div style={{display:'flex',gap:10,marginTop:20}}>
          <button className="btn btn-primary" onClick={handleSave}>{editId ? 'Save Changes' : 'Create League'}</button>
          <button className="btn btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
        </div>
      </div>
    );
  }

  // ---- LEAGUE LIST VIEW ----
  return (
    <div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:16}}>
          <h2 style={{margin:0}}>Leagues <span style={{color:'var(--text-muted)',fontWeight:400}}>({leagues.length})</span></h2>
          {setLeagues && <button className="btn btn-primary" onClick={handleCreate}>+ Create League</button>}
        </div>
        {leagues.length === 0 ? (
          <div className="empty"><p>No leagues yet. Create your first league.</p></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>League Name</th><th>Access</th><th>Players</th><th>Avg Age</th><th>Level</th><th>Commissioners</th><th>Frequency</th><th>Days</th><th>Team A</th><th>Team B</th><th>Format</th><th>Actions</th></tr></thead>
              <tbody>
                {leagues.map(l => {
                  const commishes = getCommishNames(l.commissioners);
                  const leaguePlayers = (roster || []).filter(p => (p.leagueIds || []).includes(l.id));
                  const ages = leaguePlayers.map(p => calcAge(p.birthday)).filter(a => a !== null);
                  const avgAge = ages.length > 0 ? (ages.reduce((s,a) => s+a, 0) / ages.length).toFixed(1) : null;
                  return (
                  <tr key={l.id}>
                    <td><strong style={{cursor:'pointer',color:'var(--brand)',transition:'opacity 0.15s'}} onClick={() => setViewLeague(l)}>{l.name}</strong></td>
                    <td>{l.leagueType === 'open' ? <span className="badge badge-green" style={{fontSize:9}}>Open</span> : <span className="badge badge-muted" style={{fontSize:9}}>Closed</span>}</td>
                    <td style={{fontWeight:700}}>{leaguePlayers.length}</td>
                    <td style={{fontWeight:700}}>{avgAge !== null ? avgAge : '—'}</td>
                    <td><span className={`badge ${({'Not Rated':'badge-muted',Novice:'badge-novice',Intermediate:'badge-blue',Advanced:'badge-yellow','Game Changer':'badge-gc',Pro:'badge-brand'})[l.level] || 'badge-muted'}`}>{l.level || 'Not Rated'}</span></td>
                    <td>{commishes.length > 0 ? <div style={{display:'flex',flexWrap:'wrap',gap:3}}>{commishes.map(p => <span key={p.id} className="commish-badge">{p.firstName} {p.lastName[0]}.</span>)}</div> : <span style={{color:'var(--text-muted)',fontSize:12}}>None</span>}</td>
                    <td>{l.frequencyType === 'random' ? <span className="badge badge-yellow">Random</span> : <span className="badge badge-blue">{l.daysPerWeek || 1}x / week</span>}</td>
                    <td>{l.frequencyType === 'random' ? <span style={{color:'var(--text-muted)',fontSize:12}}>As scheduled</span> : <div className="day-tags">{(l.gameDays || []).map(d => <span key={d} className="day-tag">{d}</span>)}</div>}</td>
                    <td>{l.teamAName}</td>
                    <td>{l.teamBName}</td>
                    <td><span className="badge badge-brand">{l.format?.replace('-series','') || '5v5'}</span>{isSeries(l.format) && <span style={{fontSize:9,color:'var(--text-muted)',marginLeft:4}}>Bo{l.seriesBestOf||3}</span>}</td>
                    <td style={{display:'flex',gap:4}}>
                      {setLeagues && <button className="btn btn-secondary btn-small" onClick={() => handleEdit(l)}>Edit</button>}
                      {setLeagues && <button className="btn btn-secondary btn-small" onClick={() => { setManageCommish(l.id); setAddCommishId(''); }}>Commissioners</button>}
                      {setLeagues && <button className="btn btn-danger btn-small" onClick={() => handleDelete(l.id)}>Remove</button>}
                      {!setLeagues && <span style={{fontSize:11,color:'var(--text-muted)'}}>View only</span>}
                    </td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {manageCommish && (() => {
        const lg = leagues.find(l => l.id === manageCommish);
        if (!lg) return null;
        const commishes = getCommishNames(lg.commissioners);
        const leaguePlayers = (roster || []).filter(p => (p.leagueIds || []).includes(lg.id));
        const available = leaguePlayers.filter(p => !(lg.commissioners || []).includes(p.id));
        return (
          <div className="modal-overlay" onClick={() => setManageCommish(null)}>
            <div className="modal" onClick={e => e.stopPropagation()}>
              <button className="modal-close" onClick={() => setManageCommish(null)}>&#x2715;</button>
              <h2>Commissioners — {lg.name}</h2>
              <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:16}}>Commissioners have full admin privileges for this league. They can manage games, assign teams, and send invites.</p>
              {commishes.length === 0 ? (
                <p style={{color:'var(--text-muted)',fontSize:13,fontStyle:'italic',marginBottom:16}}>No commissioners assigned yet.</p>
              ) : (
                <div className="commish-list">
                  {commishes.map(p => (
                    <div key={p.id} className="commish-row">
                      <div>
                        <span className="name">{p.firstName} {p.lastName}</span>
                        <span className="role" style={{marginLeft:8}}>Commissioner</span>
                      </div>
                      <button className="btn btn-danger btn-small" onClick={() => removeCommissioner(lg.id, p.id)}>Remove</button>
                    </div>
                  ))}
                </div>
              )}
              {available.length > 0 && (
                <div className="commish-add-row">
                  <select value={addCommishId} onChange={e => setAddCommishId(e.target.value)}>
                    <option value="">Select player to add...</option>
                    {available.sort((a,b) => a.lastName.localeCompare(b.lastName)).map(p => (
                      <option key={p.id} value={p.id}>{p.lastName}, {p.firstName}</option>
                    ))}
                  </select>
                  <button className="btn btn-primary btn-small" onClick={() => addCommissioner(lg.id, addCommishId)}>Add</button>
                </div>
              )}
              {available.length === 0 && commishes.length > 0 && (
                <p style={{color:'var(--text-muted)',fontSize:12,marginTop:12}}>All league players are commissioners.</p>
              )}
              {leaguePlayers.length === 0 && (
                <p style={{color:'var(--text-muted)',fontSize:12,marginTop:12}}>No players assigned to this league yet. Assign players in the Roster tab first.</p>
              )}
            </div>
          </div>
        );
      })()}
      {confirmDelete && (
        <ConfirmModal
          title="Delete League"
          message={`Are you sure you want to delete "${confirmDelete.name}"? This cannot be undone.`}
          confirmLabel="Delete"
          onConfirm={confirmDeleteLeague}
          onCancel={() => setConfirmDelete(null)}
        />
      )}
      {inviteLeague && setRoster && (
        <InvitePlayerModal league={inviteLeague} roster={roster} setRoster={setRoster} showToast={showToast} onClose={() => setInviteLeague(null)} />
      )}
    </div>
  );
}

// ============= GAMES ==============
function Games({ games, setGames, roster, leagues, showToast, onViewGame }) {
  const [showForm, setShowForm] = useState(false);
  const [showPastForm, setShowPastForm] = useState(false);
  const [activeGame, setActiveGame] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [view, setView] = useState('list');
  const [gameSearch, setGameSearch] = useState('');
  const [leagueFilter, setLeagueFilter] = useState('all');
  const [showRunItBack, setShowRunItBack] = useState(null);
  const blank = { leagueId:'', leagueName:'', teamAName:'Team A', teamBName:'Team B', format:'5v5', numInvites:10, gameDate:'', gameTime:'', teamA:[], teamB:[], invited:[], scoreA:null, scoreB:null, locked:false };
  const pastBlank = { leagueId:'', leagueName:'', teamAName:'Team A', teamBName:'Team B', format:'5v5', gameDate:'', gameTime:'', scoreA:'', scoreB:'', winTeam:'', gameWinner:'' };
  const [form, setForm] = useState(blank);
  const [pastForm, setPastForm] = useState(pastBlank);

  const handleLeagueSelect = (lid) => {
    const lg = leagues.find(l => l.id === lid);
    if (lg) {
      setForm({...form, leagueId:lid, leagueName:lg.name, teamAName:lg.teamAName, teamBName:lg.teamBName, format:lg.format});
    } else {
      setForm({...form, leagueId:'', leagueName:''});
    }
  };

  const handleCreate = () => {
    if (!form.gameDate) return;
    const game = { ...form, id: uid() };
    setGames([...games, game]);
    setForm(blank); setShowForm(false);
  };

  const handlePastLeagueSelect = (lid) => {
    const lg = leagues.find(l => l.id === lid);
    if (lg) {
      setPastForm({...pastForm, leagueId:lid, leagueName:lg.name, teamAName:lg.teamAName, teamBName:lg.teamBName, format:lg.format});
    } else {
      setPastForm({...pastForm, leagueId:'', leagueName:''});
    }
  };

  const handleCreatePast = () => {
    if (!pastForm.gameDate) { showToast('Game date is required.'); return; }
    const hasScore = pastForm.scoreA !== '' && pastForm.scoreB !== '';
    if (!hasScore && !pastForm.winTeam) { showToast('Enter a score or select a winner.'); return; }
    const game = {
      id: uid(),
      leagueId: pastForm.leagueId,
      leagueName: pastForm.leagueName,
      teamAName: pastForm.teamAName,
      teamBName: pastForm.teamBName,
      format: pastForm.format,
      numInvites: 0,
      gameDate: pastForm.gameDate,
      gameTime: pastForm.gameTime || '',
      teamA: [],
      teamB: [],
      invited: [],
      scoreA: hasScore ? Number(pastForm.scoreA) : null,
      scoreB: hasScore ? Number(pastForm.scoreB) : null,
      winTeam: pastForm.winTeam || null,
      locked: true,
      manualEntry: true,
      gameWinner: pastForm.gameWinner || null,
    };
    setGames([...games, game]);
    setPastForm(pastBlank); setShowPastForm(false);
    showToast('Past game added successfully.');
  };

  const handleDelete = (id) => {
    const g = games.find(gm => gm.id === id);
    setConfirmDelete({ id, name: g ? `${g.teamAName} vs ${g.teamBName}` : 'this game' });
  };
  const confirmDeleteGame = () => {
    if (confirmDelete) {
      setGames(games.filter(g => g.id !== confirmDelete.id));
      if (activeGame?.id === confirmDelete.id) setActiveGame(null);
      setConfirmDelete(null);
    }
  };

  // Auto-schedule: generate games for all scheduled leagues 5 weeks out
  const autoScheduleAll = () => {
    let newGames = [];
    leagues.forEach(lg => {
      const generated = generateLeagueSchedule(lg, games);
      newGames = [...newGames, ...generated];
    });
    if (newGames.length === 0) { showToast('No new games to schedule. All leagues are up to date.'); return; }
    setGames([...games, ...newGames]);
    showToast(`Scheduled ${newGames.length} new game${newGames.length !== 1 ? 's' : ''} across ${leagues.filter(l => l.frequencyType !== 'random').length} league(s).`);
  };

  const autoScheduleLeague = (lg) => {
    const generated = generateLeagueSchedule(lg, games);
    if (generated.length === 0) { showToast(`${lg.name} is already scheduled 5 weeks out.`); return; }
    setGames([...games, ...generated]);
    showToast(`Scheduled ${generated.length} new game${generated.length !== 1 ? 's' : ''} for ${lg.name}.`);
  };

  const updateGame = (id, updates) => {
    const updated = games.map(g => g.id === id ? { ...g, ...updates } : g);
    setGames(updated);
    if (activeGame?.id === id) setActiveGame({ ...activeGame, ...updates });
  };

  const sendInvites = (game) => {
    const available = roster.filter(p => !game.invited.includes(p.id));
    const toInvite = available.slice(0, game.numInvites - game.invited.length);
    if (toInvite.length === 0) { showToast('All players already invited or roster is empty.'); return; }
    const newInvited = [...game.invited, ...toInvite.map(p => p.id)];
    updateGame(game.id, { invited: newInvited });
    const names = toInvite.map(p => `${p.firstName} ${p.lastName}`).join(', ');
    showToast(`Invites sent to ${toInvite.length} player(s): ${names}`);
  };

  const assignPlayer = (game, playerId, team) => {
    if (game.locked) return;
    let tA = [...game.teamA].filter(id => id !== playerId);
    let tB = [...game.teamB].filter(id => id !== playerId);
    if (team === 'A') tA.push(playerId);
    if (team === 'B') tB.push(playerId);
    updateGame(game.id, { teamA: tA, teamB: tB });
  };

  const unassign = (game, playerId) => {
    if (game.locked) return;
    updateGame(game.id, { teamA: game.teamA.filter(id => id !== playerId), teamB: game.teamB.filter(id => id !== playerId) });
  };

  const toggleLock = (game) => {
    updateGame(game.id, { locked: !game.locked });
    showToast(game.locked ? 'Game unlocked' : 'Game locked — rosters are set');
  };

  const saveScore = (game, sA, sB, winTeam) => {
    const wasDone = isGameComplete(game);
    updateGame(game.id, {
      scoreA: sA === '' ? null : Number(sA),
      scoreB: sB === '' ? null : Number(sB),
      winTeam: winTeam || null,
    });
    // Check if game just became final — trigger Run it Back
    const nowDone = (sA !== '' && sB !== '') || !!winTeam;
    if (!wasDone && nowDone && game.leagueId) {
      // Find the next upcoming game in this league
      const today = new Date().toISOString().slice(0,10);
      const nextGame = games.filter(g => g.id !== game.id && (g.leagueId === game.leagueId || g.leagueName === game.leagueName) && !isGameComplete(g) && g.gameDate >= today).sort((a,b) => (a.gameDate||'').localeCompare(b.gameDate||''))[0];
      if (nextGame && (nextGame.teamA||[]).length === 0 && (nextGame.teamB||[]).length === 0) {
        setShowRunItBack({ fromGame: game, toGame: nextGame });
      }
    }
  };

  const executeRunItBack = () => {
    if (!showRunItBack) return;
    const { fromGame, toGame } = showRunItBack;
    updateGame(toGame.id, {
      teamA: [...(fromGame.teamA||[])],
      teamB: [...(fromGame.teamB||[])],
    });
    showToast(`Run it Back! ${(fromGame.teamA||[]).length + (fromGame.teamB||[]).length} players loaded into ${fmtGameDate(toGame.gameDate)}.`);
    setShowRunItBack(null);
  };

  const getPlayer = (id) => roster.find(p => p.id === id);

  // MANAGE VIEW
  if (view === 'manage' && activeGame) {
    const g = games.find(gm => gm.id === activeGame.id) || activeGame;
    const assigned = [...g.teamA, ...g.teamB];

    // Get league roster for this game
    const lg = g.leagueId ? leagues.find(l => l.id === g.leagueId) : null;
    const leagueRoster = lg ? roster.filter(p => (p.leagueIds||[]).includes(lg.id)) : roster;
    const activePlayers = leagueRoster.filter(p => (p.status||'Active') === 'Active');
    const availablePlayers = activePlayers.filter(p => !assigned.includes(p.id)).sort((a,b) => a.lastName.localeCompare(b.lastName));

    // Auto-build from league team assignments
    const autoBuildRosters = () => {
      if (g.locked) return;
      const teamAIds = []; const teamBIds = [];
      activePlayers.forEach(p => {
        const teamAssign = (p.leagueTeams||{})[g.leagueId];
        if (teamAssign === 'A') teamAIds.push(p.id);
        else if (teamAssign === 'B') teamBIds.push(p.id);
        // Swing players stay unassigned for manual placement
      });
      updateGame(g.id, { teamA: teamAIds, teamB: teamBIds });
      showToast(`Rosters built: ${teamAIds.length} on ${g.teamAName}, ${teamBIds.length} on ${g.teamBName}. Assign swing players manually.`);
    };

    // Swing players not yet on a team for this game
    const swingPlayers = lg ? activePlayers.filter(p => {
      const ta = (p.leagueTeams||{})[lg.id];
      return (!ta || ta === 'Swing') && !assigned.includes(p.id);
    }) : [];

    return (
      <div>
        <button className="btn btn-secondary btn-small" onClick={() => { setView('list'); setActiveGame(null); }} style={{marginBottom:16}}>&#8592; Back to Games</button>

        <div className={`card ${g.locked ? 'locked-card' : ''}`}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
            <h2 style={{margin:0}}>{g.teamAName} vs {g.teamBName}</h2>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span className="badge badge-brand">{g.format?.replace('-series','') || '5v5'}</span>
              <span className={`badge ${g.locked ? 'badge-green' : 'badge-yellow'}`}>{g.locked ? 'Locked' : 'Open'}</span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8,flexWrap:'wrap'}}>
            <span style={{color:'var(--text-muted)',fontSize:13}}>{g.leagueName ? `${g.leagueName} \u00b7 ` : ''}{fmtGameDate(g.gameDate)} @</span>
            <input type="time" value={g.gameTime || ''} onChange={e => updateGame(g.id, { gameTime: e.target.value })} style={{padding:'4px 8px',fontSize:13,borderRadius:6,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text-primary)',fontFamily:'inherit',width:110}} />
            {g.gameTime && <span style={{color:'var(--text-muted)',fontSize:12}}>{fmtTime(g.gameTime)}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6,flexWrap:'wrap'}}>
            <span style={{color:'var(--text-muted)',fontSize:11}}>Location:</span>
            <input value={g.location || ''} onChange={e => { const leagueAddr = lg?.address||lg?.location||''; updateGame(g.id, { location: e.target.value, locationOverride: leagueAddr && e.target.value !== leagueAddr }); }} placeholder={lg?.address||lg?.location || 'Enter location'} style={{padding:'4px 8px',fontSize:12,borderRadius:6,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text-primary)',fontFamily:'inherit',flex:1,maxWidth:400}} />
            {g.locationOverride && <span style={{fontSize:9,padding:'2px 6px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700}}>LOCATION CHANGE</span>}
          </div>
        </div>

        {/* BDL Line */}
        {(g.teamA.length > 0 || g.teamB.length > 0) && !isGameComplete(g) && lg?.bettingLineEnabled && (
          <div style={{marginTop:16}}>
            <BettingLineCard game={g} games={games} roster={roster} />
          </div>
        )}

        {/* Build Rosters */}
        <div className="section-label" style={{marginTop:24}}>Game Rosters</div>
        <div className="card">
          {g.locked && <p style={{color:'var(--brand)',fontSize:12,fontWeight:600,marginBottom:12,letterSpacing:'0.04em',textTransform:'uppercase'}}>Rosters are locked. Unlock to make changes.</p>}

          {!g.locked && (
            <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
              {lg && <button className="btn btn-primary btn-small" onClick={autoBuildRosters}>Build from League Rosters</button>}
              <button className="btn btn-secondary btn-small" onClick={() => { if (!g.locked) updateGame(g.id, {teamA:[],teamB:[]}); }}>Clear All</button>
              <span style={{fontSize:11,color:'var(--text-muted)'}}>
                {lg ? `${activePlayers.length} active players in ${lg.name}` : `${roster.length} players in roster`}
              </span>
            </div>
          )}

          {/* Add Player */}
          {!g.locked && availablePlayers.length > 0 && (
            <div style={{marginBottom:16}}>
              <h3>Add Players</h3>
              {swingPlayers.length > 0 && lg && (
                <div style={{marginBottom:10,padding:'8px 12px',background:'var(--bg-subtle)',borderRadius:6,border:'1px solid var(--border)'}}>
                  <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--yellow)',marginRight:8}}>Swing Players</span>
                  <span style={{fontSize:11,color:'var(--text-muted)'}}>{swingPlayers.length} unassigned swing player{swingPlayers.length!==1?'s':''}</span>
                </div>
              )}
              <div style={{maxHeight:200,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,background:'var(--input-bg)'}}>
                {availablePlayers.map(p => {
                  const teamAssign = lg ? (p.leagueTeams||{})[lg.id] : null;
                  const isSwing = !teamAssign || teamAssign === 'Swing';
                  const lvl = lg ? ((p.leagueLevels||{})[lg.id] || 'Not Rated') : (p.level || 'Not Rated');
                  const sts = p.status || 'Active';
                  return (
                    <div key={p.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',borderBottom:'1px solid var(--border)',fontSize:13}}>
                      <span style={{fontWeight:600,flex:1}}>{p.lastName}, {p.firstName}</span>
                      <span style={{fontSize:10,color:'var(--text-muted)'}}>{lvl}</span>
                      {isSwing && <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700}}>SWING</span>}
                      <button className="assign-btn a-btn" onClick={() => assignPlayer(g, p.id, 'A')} style={{fontSize:9,padding:'3px 8px'}}>{g.teamAName}</button>
                      <button className="assign-btn b-btn" onClick={() => assignPlayer(g, p.id, 'B')} style={{fontSize:9,padding:'3px 8px'}}>{g.teamBName}</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Team Columns */}
          <div className="teams-grid">
            <div className="team-col">
              <h3>{g.teamAName} ({g.teamA.length})</h3>
              {g.teamA.map(id => { const p = getPlayer(id); if (!p) return null;
                const lvl = lg ? ((p.leagueLevels||{})[lg.id] || 'NR') : '';
                return (
                <div key={id} className="available-player">
                  <div style={{display:'flex',alignItems:'center',gap:6,flex:1}}>
                    <span className="name">{p.firstName} {p.lastName}</span>
                    {lvl && <span style={{fontSize:9,color:'var(--text-muted)'}}>{lvl}</span>}
                  </div>
                  {!g.locked && (
                    <div style={{display:'flex',gap:4}}>
                      <button className="assign-btn b-btn" onClick={() => { unassign(g, id); setTimeout(() => assignPlayer(games.find(gm=>gm.id===g.id)||g, id, 'B'), 50); }} style={{fontSize:9,padding:'2px 6px'}}>&#8594; {g.teamBName}</button>
                      <button className="assign-btn" onClick={() => unassign(g, id)} style={{fontSize:9,padding:'2px 6px'}}>&#x2715;</button>
                    </div>
                  )}
                </div>
              ); })}
              {g.teamA.length === 0 && <p style={{color:'var(--text-muted)',fontSize:12,textAlign:'center',marginTop:24}}>No players</p>}
            </div>
            <div className="vs-col">VS</div>
            <div className="team-col">
              <h3>{g.teamBName} ({g.teamB.length})</h3>
              {g.teamB.map(id => { const p = getPlayer(id); if (!p) return null;
                const lvl = lg ? ((p.leagueLevels||{})[lg.id] || 'NR') : '';
                return (
                <div key={id} className="available-player">
                  <div style={{display:'flex',alignItems:'center',gap:6,flex:1}}>
                    <span className="name">{p.firstName} {p.lastName}</span>
                    {lvl && <span style={{fontSize:9,color:'var(--text-muted)'}}>{lvl}</span>}
                  </div>
                  {!g.locked && (
                    <div style={{display:'flex',gap:4}}>
                      <button className="assign-btn a-btn" onClick={() => { unassign(g, id); setTimeout(() => assignPlayer(games.find(gm=>gm.id===g.id)||g, id, 'A'), 50); }} style={{fontSize:9,padding:'2px 6px'}}>&#8594; {g.teamAName}</button>
                      <button className="assign-btn" onClick={() => unassign(g, id)} style={{fontSize:9,padding:'2px 6px'}}>&#x2715;</button>
                    </div>
                  )}
                </div>
              ); })}
              {g.teamB.length === 0 && <p style={{color:'var(--text-muted)',fontSize:12,textAlign:'center',marginTop:24}}>No players</p>}
            </div>
          </div>
          <div className="btn-group" style={{justifyContent:'center'}}>
            <button className={`btn ${g.locked ? 'btn-secondary' : 'btn-success'}`} onClick={() => toggleLock(g)}>
              {g.locked ? 'Unlock Rosters' : 'Lock Rosters'}
            </button>
          </div>
        </div>

        {/* Score Entry */}
        <div className="section-label" style={{marginTop:24}}>Score</div>
        <div className="card">
          <ScoreEntry game={g} onSave={(sA, sB, winTeam) => saveScore(g, sA, sB, winTeam)} />
        </div>

        {/* Game Winner */}
        <div className="section-label" style={{marginTop:24}}>Game Winner</div>
        <div className="card">
          <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:12}}>Select the Game Winner from the league roster.</p>
          {(() => {
            const lg = leagues.find(l => l.id === g.leagueId);
            const leaguePlayers = lg ? roster.filter(p => (p.leagueIds||[]).includes(lg.id)) : roster;
            const sorted = leaguePlayers.slice().sort((a,b) => a.lastName.localeCompare(b.lastName));
            return (
              <div>
                <select value={g.gameWinner || ''} onChange={e => updateGame(g.id, { gameWinner: e.target.value || null })} style={{minWidth:250}}>
                  <option value="">No Game Winner selected</option>
                  {sorted.map(p => <option key={p.id} value={p.id}>{p.lastName}, {p.firstName}</option>)}
                </select>
                {g.gameWinner && (() => {
                  const wp = roster.find(p => p.id === g.gameWinner);
                  if (!wp) return null;
                  const initials = (wp.firstName?.[0]||'') + (wp.lastName?.[0]||'');
                  return (
                    <div style={{display:'flex',alignItems:'center',gap:12,marginTop:14,padding:'12px 16px',background:'var(--bg-subtle)',borderRadius:8,border:'1px solid var(--border)'}}>
                      <div style={{width:40,height:40,borderRadius:'50%',background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff',flexShrink:0}}>{initials.toUpperCase()}</div>
                      <div>
                        <div style={{fontSize:15,fontWeight:700}}>{wp.firstName} {wp.lastName}</div>
                        <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>Game Winner</div>
                      </div>
                      <span className="badge badge-brand" style={{marginLeft:'auto',fontSize:11,padding:'4px 10px'}}>GW</span>
                    </div>
                  );
                })()}
              </div>
            );
          })()}
        </div>
      </div>
    );
  }

  // LIST VIEW
  const filteredGames = games.filter(g => {
    const matchesLeague = leagueFilter === 'all' ? true : leagueFilter === 'pickup' ? (!g.leagueId && !g.leagueName) : (g.leagueId === leagueFilter || g.leagueName === (leagues.find(l => l.id === leagueFilter)||{}).name);
    const q = gameSearch.toLowerCase();
    const matchesSearch = !q || `${g.teamAName} ${g.teamBName} ${g.leagueName || ''} ${g.gameDate || ''}`.toLowerCase().includes(q);
    return matchesLeague && matchesSearch;
  }).sort((a,b) => (a.gameDate || '').localeCompare(b.gameDate || ''));

  const activeFilterLeague = leagueFilter !== 'all' && leagueFilter !== 'pickup' ? leagues.find(l => l.id === leagueFilter) : null;

  return (
    <div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:16}}>
          <h2 style={{margin:0}}>Games <span style={{color:'var(--text-muted)',fontWeight:400}}>({leagueFilter !== 'all' ? `${filteredGames.length} / ` : ''}{games.length})</span></h2>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-secondary" onClick={autoScheduleAll}>Generate Schedule</button>
            <button className="btn btn-secondary" onClick={() => { setPastForm(pastBlank); setShowPastForm(true); }}>+ Enter Past Game</button>
            <button className="btn btn-primary" onClick={() => { setForm(blank); setShowForm(true); }}>+ Schedule Game</button>
          </div>
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
          <input placeholder="Search by team, league, date..." value={gameSearch} onChange={e => setGameSearch(e.target.value)} style={{flex:1,minWidth:200}} />
          <select value={leagueFilter} onChange={e => setLeagueFilter(e.target.value)} style={{minWidth:180}}>
            <option value="all">All Games</option>
            <option value="pickup">Pickup (No League)</option>
            {leagues.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        </div>
        {activeFilterLeague && (
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,paddingLeft:12,borderLeft:'2px solid var(--brand)'}}>
            <span style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Showing</span>
            <span className="league-tag" style={{fontSize:12,padding:'4px 10px'}}>{activeFilterLeague.name}</span>
            <span style={{fontSize:12,color:'var(--text-muted)'}}>{filteredGames.length} game{filteredGames.length !== 1 ? 's' : ''}</span>
          </div>
        )}
        {leagueFilter === 'pickup' && (
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,paddingLeft:12,borderLeft:'2px solid var(--yellow)'}}>
            <span style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Showing</span>
            <span className="badge badge-yellow" style={{fontSize:12,padding:'4px 10px'}}>Pickup Games</span>
            <span style={{fontSize:12,color:'var(--text-muted)'}}>{filteredGames.length} game{filteredGames.length !== 1 ? 's' : ''}</span>
          </div>
        )}
        {filteredGames.length === 0 && (
          <div className="empty"><p>{games.length === 0 ? 'No games scheduled yet.' : 'No games match your filter.'}</p></div>
        )}
      </div>

      {/* Open Games */}
      {(() => {
        const openGames = filteredGames.filter(g => !isGameComplete(g));
        if (openGames.length === 0) return null;
        return (
          <div className="card" style={{marginTop:16}}>
            <div className="section-label" style={{marginBottom:14}}>Open Games ({openGames.length})</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>League</th><th>Matchup</th><th>Format</th><th>BDL Line</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                  {openGames.map(g => (
                    <tr key={g.id}>
                      <td style={{whiteSpace:'nowrap'}}>{fmtGameDate(g.gameDate)} <span style={{color:'var(--text-muted)'}}>@ {fmtTime(g.gameTime)}</span></td>
                      <td>{g.leagueName || <span style={{color:'var(--text-muted)'}}>Pickup</span>}</td>
                      <td><strong style={{cursor:'pointer',color:'var(--brand)'}} onClick={() => onViewGame && onViewGame(g.id)}>{g.teamAName} vs {g.teamBName}</strong></td>
                      <td><span className="badge badge-brand">{g.format?.replace('-series','') || '5v5'}</span></td>
                      <td>{(leagues.find(lg=>lg.id===g.leagueId)||{}).bettingLineEnabled ? <BettingLineCard game={g} games={games} roster={roster} compact={true} /> : <span style={{fontSize:11,color:'var(--text-muted)'}}>—</span>}</td>
                      <td><span className={`badge ${g.locked ? 'badge-blue' : 'badge-yellow'}`}>{g.locked ? 'Locked' : 'Open'}</span></td>
                      <td style={{display:'flex',gap:4}}>
                        <button className="btn btn-primary btn-small" onClick={() => { setActiveGame(g); setView('manage'); }}>Manage</button>
                        <button className="btn btn-danger btn-small" onClick={() => handleDelete(g.id)}>Remove</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}

      {/* Final Games */}
      {(() => {
        const finalGames = filteredGames.filter(g => isGameComplete(g)).sort((a,b) => (b.gameDate||'').localeCompare(a.gameDate||''));
        if (finalGames.length === 0) return null;
        return (
          <div className="card" style={{marginTop:16}}>
            <div className="section-label" style={{marginBottom:14}}>Final Games ({finalGames.length})</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>League</th><th>Matchup</th><th>Score</th><th style={{textAlign:'right'}}>+/-</th><th>Winner</th><th>Game Winner</th><th>Actions</th></tr></thead>
                <tbody>
                  {finalGames.map(g => {
                    const hasScore = g.scoreA !== null && g.scoreB !== null;
                    const wt = getGameWinTeam(g);
                    const winLabel = wt === 'A' ? g.teamAName : wt === 'B' ? g.teamBName : wt === 'Tie' ? 'Tie' : '—';
                    const diff = hasScore ? Math.abs(g.scoreA - g.scoreB) : null;
                    const gw = g.gameWinner ? roster.find(p => p.id === g.gameWinner) : null;
                    return (
                      <tr key={g.id}>
                        <td style={{whiteSpace:'nowrap'}}>{fmtGameDate(g.gameDate)} <span style={{color:'var(--text-muted)'}}>@ {fmtTime(g.gameTime)}</span></td>
                        <td>{g.leagueName || <span style={{color:'var(--text-muted)'}}>Pickup</span>}</td>
                        <td><strong style={{cursor:'pointer',color:'var(--brand)'}} onClick={() => onViewGame && onViewGame(g.id)}>{g.teamAName} vs {g.teamBName}</strong></td>
                        <td>{hasScore ? <strong>{g.scoreA} — {g.scoreB}</strong> : <span className="badge badge-green">{winLabel} W</span>}</td>
                        <td style={{textAlign:'right',fontWeight:700}}>{diff !== null ? (diff === 0 ? '0' : diff) : '—'}</td>
                        <td><span className="badge badge-green">{winLabel}</span></td>
                        <td>{gw ? <span style={{display:'inline-flex',alignItems:'center',gap:4}}><span style={{width:18,height:18,borderRadius:'50%',background:'var(--brand)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:800,color:'#fff'}}>{(gw.firstName?.[0]||'')+(gw.lastName?.[0]||'')}</span><span style={{fontSize:12,fontWeight:600}}>{gw.firstName} {gw.lastName[0]}.</span></span> : <span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}</td>
                        <td style={{display:'flex',gap:4}}>
                          <button className="btn btn-primary btn-small" onClick={() => { setActiveGame(g); setView('manage'); }}>Manage</button>
                          <button className="btn btn-danger btn-small" onClick={() => handleDelete(g.id)}>Remove</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}

      {showForm && (
        <div className="modal-overlay" onClick={() => setShowForm(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setShowForm(false)}>&#x2715;</button>
            <h2>Schedule Game</h2>
            <div className="form-grid">
              <div className="form-group"><label>League</label>
                <select value={form.leagueId} onChange={e => handleLeagueSelect(e.target.value)}>
                  <option value="">No League (Pickup)</option>
                  {leagues.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Format</label>
                <select value={form.format} onChange={e => setForm({...form, format:e.target.value})}>
                  {FORMAT_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Team A Name</label><input value={form.teamAName} onChange={e => setForm({...form, teamAName:e.target.value})} /></div>
              <div className="form-group"><label>Team B Name</label><input value={form.teamBName} onChange={e => setForm({...form, teamBName:e.target.value})} /></div>
              <div className="form-group"><label>Game Date *</label><input type="date" value={form.gameDate} onChange={e => setForm({...form, gameDate:e.target.value})} /></div>
              <div className="form-group"><label>Game Time</label><input type="time" value={form.gameTime} onChange={e => setForm({...form, gameTime:e.target.value})} /></div>
              <div className="form-group"><label>No. of Invites</label>
                <select value={form.numInvites} onChange={e => setForm({...form, numInvites:Number(e.target.value)})}>
                  {[6,8,10,12,14,16,18,20].map(n => <option key={n} value={n}>{n} players</option>)}
                </select>
              </div>
            </div>
            <div className="btn-group">
              <button className="btn btn-primary" onClick={handleCreate}>Schedule Game</button>
              <button className="btn btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {showPastForm && (
        <div className="modal-overlay" onClick={() => setShowPastForm(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setShowPastForm(false)}>&#x2715;</button>
            <h2>Enter Past Game</h2>
            <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:16}}>Manually log a completed game with the final score.</p>
            <div className="form-grid">
              <div className="form-group"><label>League</label>
                <select value={pastForm.leagueId} onChange={e => handlePastLeagueSelect(e.target.value)}>
                  <option value="">No League (Pickup)</option>
                  {leagues.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Format</label>
                <select value={pastForm.format} onChange={e => setPastForm({...pastForm, format:e.target.value})}>
                  {FORMAT_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Game Date *</label><input type="date" value={pastForm.gameDate} onChange={e => setPastForm({...pastForm, gameDate:e.target.value})} /></div>
              <div className="form-group"><label>Game Time</label><input type="time" value={pastForm.gameTime} onChange={e => setPastForm({...pastForm, gameTime:e.target.value})} /></div>
              <div className="form-group"><label>Team A Name</label><input value={pastForm.teamAName} onChange={e => setPastForm({...pastForm, teamAName:e.target.value})} /></div>
              <div className="form-group"><label>Team B Name</label><input value={pastForm.teamBName} onChange={e => setPastForm({...pastForm, teamBName:e.target.value})} /></div>
            </div>
            <div style={{marginTop:16}}>
              <div className="section-label" style={{marginBottom:12}}>Result</div>
              <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:16}}>
                {[{val:'A',label:`${pastForm.teamAName} Win`,color:'var(--blue)'},{val:'B',label:`${pastForm.teamBName} Win`,color:'var(--green)'},{val:'Tie',label:'Tie',color:'var(--yellow)'}].map(opt => (
                  <button key={opt.val} type="button" onClick={() => setPastForm({...pastForm, winTeam: pastForm.winTeam === opt.val ? '' : opt.val})} style={{
                    padding:'10px 20px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',
                    cursor:'pointer',border:'2px solid',fontFamily:'inherit',transition:'all 0.15s',
                    background: pastForm.winTeam === opt.val ? opt.color : 'transparent',
                    color: pastForm.winTeam === opt.val ? '#fff' : opt.color,
                    borderColor: pastForm.winTeam === opt.val ? opt.color : 'var(--border)',
                  }}>{opt.label}</button>
                ))}
              </div>
              <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:10,textAlign:'center'}}>Score (optional)</div>
                <div className="score-entry">
                  <div>
                    <div className="score-team-label">{pastForm.teamAName}</div>
                    <input className="score-input" type="number" min="0" value={pastForm.scoreA} onChange={e => setPastForm({...pastForm, scoreA:e.target.value})} placeholder="—" />
                  </div>
                  <div className="score-vs">VS</div>
                  <div>
                    <div className="score-team-label">{pastForm.teamBName}</div>
                    <input className="score-input" type="number" min="0" value={pastForm.scoreB} onChange={e => setPastForm({...pastForm, scoreB:e.target.value})} placeholder="—" />
                  </div>
                </div>
              </div>
            </div>
            <div style={{marginTop:16}}>
              <div className="form-group">
                <label>Game Winner</label>
                <select value={pastForm.gameWinner || ''} onChange={e => setPastForm({...pastForm, gameWinner:e.target.value})}>
                  <option value="">None</option>
                  {(() => {
                    const lg = leagues.find(l => l.id === pastForm.leagueId);
                    const players = lg ? roster.filter(p => (p.leagueIds||[]).includes(lg.id)) : roster;
                    return players.slice().sort((a,b) => a.lastName.localeCompare(b.lastName)).map(p => <option key={p.id} value={p.id}>{p.lastName}, {p.firstName}</option>);
                  })()}
                </select>
              </div>
            </div>
            <div className="btn-group" style={{marginTop:16}}>
              <button className="btn btn-primary" onClick={handleCreatePast}>Save Past Game</button>
              <button className="btn btn-secondary" onClick={() => setShowPastForm(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {confirmDelete && (
        <ConfirmModal
          title="Delete Game"
          message={`Are you sure you want to delete the game "${confirmDelete.name}"? This cannot be undone.`}
          confirmLabel="Delete"
          onConfirm={confirmDeleteGame}
          onCancel={() => setConfirmDelete(null)}
        />
      )}
      {showRunItBack && (
        <div className="modal-overlay" onClick={() => setShowRunItBack(null)}>
          <div className="modal" style={{maxWidth:440,textAlign:'center'}} onClick={e => e.stopPropagation()}>
            <div style={{fontSize:40,marginBottom:12}}>&#9851;</div>
            <h2 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.03em',marginBottom:8}}>Run it Back?</h2>
            <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:6}}>Game is final. Load the same rosters into the next game?</p>
            <div style={{background:'var(--bg-subtle)',borderRadius:8,padding:14,margin:'16px 0',textAlign:'left'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>From</div>
                  <div style={{fontSize:13,fontWeight:600}}>{fmtGameDate(showRunItBack.fromGame.gameDate)}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>To</div>
                  <div style={{fontSize:13,fontWeight:600}}>{fmtGameDate(showRunItBack.toGame.gameDate)}</div>
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text-muted)'}}>
                <span>{showRunItBack.fromGame.teamAName}: {(showRunItBack.fromGame.teamA||[]).length} players</span>
                <span>{showRunItBack.fromGame.teamBName}: {(showRunItBack.fromGame.teamB||[]).length} players</span>
              </div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="btn btn-primary" onClick={executeRunItBack}>Run it Back</button>
              <button className="btn btn-secondary" onClick={() => setShowRunItBack(null)}>Skip</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============= PLAYER PROFILE (PLAYER VIEW) ==============
function PlayerProfile({ player, leagues, games, onViewGame, roster, setRoster, showToast }) {
  const [pYear, setPYear] = useState(String(new Date().getFullYear()));
  const p = player;
  const initials = (p.firstName?.[0] || '') + (p.lastName?.[0] || '');
  const pLeagues = (p.leagueIds || []).map(id => (leagues || []).find(l => l.id === id)).filter(Boolean);
  const allPlayerGames = games.filter(g => g.teamA.includes(p.id) || g.teamB.includes(p.id));
  const pYears = [...new Set(allPlayerGames.filter(g => g.gameDate).map(g => g.gameDate.slice(0,4)))].sort().reverse();
  const playerGames = pYear === 'all' ? allPlayerGames : allPlayerGames.filter(g => g.gameDate && g.gameDate.startsWith(pYear));
  const completedGames = playerGames.filter(g => isGameComplete(g));
  let wins = 0, losses = 0;
  completedGames.forEach(g => {
    const onA = g.teamA.includes(p.id);
    const wt = getGameWinTeam(g);
    if ((onA && wt === 'A') || (!onA && wt === 'B')) wins++;
    else if (wt && wt !== 'Tie') losses++;
  });

  const levelBadge = (lvl) => {
    const cls = { 'Not Rated':'badge-muted', Novice:'badge-novice', Intermediate:'badge-blue', Advanced:'badge-yellow', 'Game Changer':'badge-gc', Pro:'badge-brand' };
    return <span className={`badge ${cls[lvl] || 'badge-muted'}`}>{lvl}</span>;
  };

  return (
    <div>
      <div className="card" style={{textAlign:'center',padding:'32px 28px'}}>
        <div style={{display:'inline-flex',width:72,height:72,borderRadius:'50%',background:'var(--brand)',alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:800,color:'#fff',letterSpacing:'-0.03em',marginBottom:16}}>{initials.toUpperCase()}</div>
        <div style={{fontSize:22,fontWeight:700,letterSpacing:'-0.03em'}}>{p.firstName} {p.lastName}</div>
        <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>{p.sport || 'No sport listed'}{p.highestLevel ? ` \u00b7 ${p.highestLevel}` : ''}</div>
        <div style={{marginTop:12}}>{(() => {
          const ll = p.leagueLevels || {};
          const vals = Object.values(ll).filter(v => v && v !== 'Not Rated');
          if (vals.length === 0) return <span style={{fontSize:11,color:'var(--text-muted)'}}>Not Rated</span>;
          const best = ['Pro','Advanced','Intermediate','Novice'].find(lv => vals.includes(lv)) || vals[0];
          return levelBadge(best);
        })()}</div>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <span style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Season</span>
        <div style={{display:'flex',gap:4}}>
          <button type="button" onClick={() => setPYear('all')} style={{padding:'6px 14px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',cursor:'pointer',border:'1px solid var(--border)',fontFamily:'inherit',transition:'all 0.15s',background:pYear==='all'?'var(--brand)':'var(--surface)',color:pYear==='all'?'#fff':'var(--text-muted)',borderColor:pYear==='all'?'var(--brand)':'var(--border)'}}>All Time</button>
          {(pYears.length > 0 ? pYears : [String(new Date().getFullYear())]).map(y => (
            <button key={y} type="button" onClick={() => setPYear(y)} style={{padding:'6px 14px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:'0.04em',cursor:'pointer',border:'1px solid var(--border)',fontFamily:'inherit',transition:'all 0.15s',background:pYear===y?'var(--brand)':'var(--surface)',color:pYear===y?'#fff':'var(--text-muted)',borderColor:pYear===y?'var(--brand)':'var(--border)'}}>{y}</button>
          ))}
        </div>
      </div>

      <div className="stat-grid">
        <div className="stat-card"><div className="num">{completedGames.length}</div><div className="label">Games Played {pYear !== 'all' ? pYear : ''}</div></div>
        <div className="stat-card"><div className="num" style={{color:'var(--green)'}}>{wins}</div><div className="label">Wins {pYear !== 'all' ? pYear : ''}</div></div>
        <div className="stat-card"><div className="num" style={{color:'var(--red)'}}>{losses}</div><div className="label">Losses {pYear !== 'all' ? pYear : ''}</div></div>
        <div className="stat-card"><div className="num">{pLeagues.length}</div><div className="label">Leagues</div></div>
      </div>

      <div className="section-label">Contact Info</div>
      <div className="card">
        <div className="profile-grid">
          <div className="profile-field">
            <span className="profile-field-label">Cell</span>
            {p.cellPrivate ? <span className="profile-field-value" style={{color:'var(--text-muted)',fontStyle:'italic',display:'flex',alignItems:'center',gap:6}}>Private <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700}}>PRIVATE</span></span> : <span className={`profile-field-value ${!p.cell ? 'empty' : ''}`}>{p.cell || 'Not provided'}</span>}
          </div>
          <div className="profile-field">
            <span className="profile-field-label">Email</span>
            {p.emailPrivate ? <span className="profile-field-value" style={{color:'var(--text-muted)',fontStyle:'italic',display:'flex',alignItems:'center',gap:6}}>Private <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700}}>PRIVATE</span></span> : <span className={`profile-field-value ${!p.email ? 'empty' : ''}`}>{p.email || 'Not provided'}</span>}
          </div>
          <div className="profile-field">
            <span className="profile-field-label">Address</span>
            {p.addressPrivate ? <span className="profile-field-value" style={{color:'var(--text-muted)',fontStyle:'italic',display:'flex',alignItems:'center',gap:6}}>Private <span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--yellow-bg)',color:'var(--yellow)',fontWeight:700}}>PRIVATE</span></span> : <span className={`profile-field-value ${!p.address && !p.city ? 'empty' : ''}`}>{p.address ? `${p.address}, ` : ''}{p.city || ''}{p.state ? `, ${p.state}` : ''}{p.zip ? ` ${p.zip}` : ''}{!p.address && !p.city ? 'Not provided' : ''}</span>}
          </div>
        </div>
      </div>

      <div className="section-label" style={{marginTop:24}}>Background</div>
      <div className="card">
        <div className="profile-grid">
          <div className="profile-field">
            <span className="profile-field-label">Hometown</span>
            <span className={`profile-field-value ${!p.city ? 'empty' : ''}`}>{p.city ? `${p.city}${p.state ? `, ${p.state}` : ''}` : 'Not provided'}</span>
          </div>
          <div className="profile-field">
            <span className="profile-field-label">College</span>
            <span className={`profile-field-value ${!p.college ? 'empty' : ''}`}>{p.college || 'Not provided'}</span>
          </div>
          <div className="profile-field">
            <span className="profile-field-label">Sport</span>
            <span className={`profile-field-value ${!p.sport ? 'empty' : ''}`}>{p.sport || 'Not provided'}</span>
          </div>
          <div className="profile-field">
            <span className="profile-field-label">Highest Level Played</span>
            <span className={`profile-field-value ${!p.highestLevel ? 'empty' : ''}`}>{p.highestLevel || 'Not provided'}</span>
          </div>
        </div>
      </div>

      {pLeagues.length > 0 && (
        <div>
          <div className="section-label" style={{marginTop:24}}>My Leagues &amp; Skill Rating</div>
          <div className="card">
            {pLeagues.map(l => {
              const blended = calcBlendedLevel(p, l.id);
              const selfLvl = (p.selfRatings||{})[l.id] || 'Not Rated';
              const updateSelfRating = (newLvl) => {
                if (!setRoster || !roster) return;
                const updated = roster.map(r => r.id !== p.id ? r : { ...r, selfRatings: { ...(r.selfRatings||{}), [l.id]: newLvl } });
                setRoster(updated);
                showToast && showToast('Self-rating updated.');
              };
              return (
                <div key={l.id} style={{padding:'14px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                    <div>
                      <strong style={{fontSize:14}}>{l.name}</strong>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{l.format} {l.leagueType === 'open' ? '\u00b7 Open' : '\u00b7 Private'}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Overall Rating</div>
                      <span className={`badge ${({'Not Rated':'badge-muted',Novice:'badge-novice',Intermediate:'badge-blue',Advanced:'badge-yellow','Game Changer':'badge-gc',Pro:'badge-brand'})[blended.level] || 'badge-muted'}`} style={{fontSize:12,padding:'4px 10px'}}>{blended.level}{blended.hasData ? ` (${blended.score})` : ''}</span>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginTop:12}}>
                    <div>
                      <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Self Rating (25%)</div>
                      {setRoster ? (
                        <select value={selfLvl} onChange={e => updateSelfRating(e.target.value)} style={{padding:'4px 8px',fontSize:11,fontWeight:600,borderRadius:4,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text-primary)',fontFamily:'inherit',width:'100%'}}>
                          {['Not Rated','Novice','Intermediate','Advanced','Game Changer','Pro'].map(lv => <option key={lv} value={lv}>{lv}</option>)}
                        </select>
                      ) : <span style={{fontSize:12,fontWeight:600}}>{selfLvl}</span>}
                    </div>
                    <div>
                      <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Commissioner (50%)</div>
                      <span style={{fontSize:12,fontWeight:600}}>{(p.leagueLevels||{})[l.id] || 'Not Rated'}</span>
                    </div>
                    <div>
                      <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Peer Rating (25%)</div>
                      <span style={{fontSize:12,fontWeight:600}}>{blended.peerScore !== null ? `${NUM_TO_LEVEL(blended.peerScore)} (${blended.peerCount} vote${blended.peerCount!==1?'s':''})` : 'No votes'}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Rate Teammates */}
      {pLeagues.length > 0 && setRoster && roster && (
        <div>
          <div className="section-label" style={{marginTop:24}}>Rate Your Teammates</div>
          <div className="card">
            <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>Rate players in your leagues. Your ratings are anonymous — players only see their blended score.</p>
            {pLeagues.map(l => {
              const leagueMates = (roster||[]).filter(r => r.id !== p.id && (r.leagueIds||[]).includes(l.id)).sort((a,b) => a.lastName.localeCompare(b.lastName));
              if (leagueMates.length === 0) return null;
              return (
                <div key={l.id} style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8,paddingLeft:10,borderLeft:'2px solid var(--brand)'}}>{l.name}</div>
                  <div style={{maxHeight:250,overflowY:'auto'}}>
                    {leagueMates.map(mate => {
                      const myVote = ((mate.peerRatings||{})[l.id]||{})[p.id] || 'Not Rated';
                      const updatePeerRating = (newLvl) => {
                        const updated = roster.map(r => {
                          if (r.id !== mate.id) return r;
                          const pr = { ...(r.peerRatings||{}) };
                          if (!pr[l.id]) pr[l.id] = {};
                          pr[l.id] = { ...pr[l.id], [p.id]: newLvl };
                          return { ...r, peerRatings: pr };
                        });
                        setRoster(updated);
                      };
                      return (
                        <div key={mate.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                          <span style={{fontSize:13,fontWeight:600,flex:1}}>{mate.lastName}, {mate.firstName}</span>
                          <select value={myVote} onChange={e => updatePeerRating(e.target.value)} style={{padding:'3px 6px',fontSize:10,fontWeight:600,borderRadius:4,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text-primary)',fontFamily:'inherit'}}>
                            {['Not Rated','Novice','Intermediate','Advanced','Game Changer','Pro'].map(lv => <option key={lv} value={lv}>{lv}</option>)}
                          </select>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Open Leagues to Join */}
      {(() => {
        const openLeagues = (leagues||[]).filter(l => l.leagueType === 'open' && !(p.leagueIds||[]).includes(l.id));
        if (openLeagues.length === 0 || !setRoster || !roster) return null;
        const joinLeague = (leagueId) => {
          const updated = roster.map(r => r.id !== p.id ? r : { ...r, leagueIds: [...(r.leagueIds||[]), leagueId], leagueTeams: { ...(r.leagueTeams||{}), [leagueId]: 'Swing' }, leagueLevels: { ...(r.leagueLevels||{}), [leagueId]: 'Not Rated' } });
          setRoster(updated);
          showToast && showToast('Joined league!');
        };
        return (
          <div>
            <div className="section-label" style={{marginTop:24}}>Open Leagues</div>
            <div className="card">
              <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:12}}>These leagues are open for anyone to join.</p>
              {openLeagues.map(l => (
                <div key={l.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',borderBottom:'1px solid var(--border)'}}>
                  <div>
                    <strong style={{fontSize:14}}>{l.name}</strong>
                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{l.format}{(l.address||l.location) ? ` \u00b7 ${l.address||l.location}` : ''}</div>
                  </div>
                  <button className="btn btn-primary btn-small" onClick={() => joinLeague(l.id)}>Join League</button>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {completedGames.length > 0 && (
        <div>
          <div className="section-label" style={{marginTop:24}}>Game History</div>
          <div className="card">
            <div className="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>Matchup</th><th>Score</th><th>Result</th></tr></thead>
                <tbody>
                  {completedGames.slice().reverse().map(g => {
                    const onA = g.teamA.includes(p.id);
                    const won = (onA && g.scoreA > g.scoreB) || (!onA && g.scoreB > g.scoreA);
                    const tied = g.scoreA === g.scoreB;
                    return (
                      <tr key={g.id}>
                        <td>{fmtGameDate(g.gameDate)}</td>
                        <td><strong style={{cursor:'pointer',color:'var(--brand)'}} onClick={() => onViewGame && onViewGame(g.id)}>{g.teamAName} vs {g.teamBName}</strong></td>
                        <td><strong>{g.scoreA} — {g.scoreB}</strong></td>
                        <td><span className={`badge ${tied ? 'badge-yellow' : won ? 'badge-green' : 'badge-red'}`}>{tied ? 'Tie' : won ? 'Win' : 'Loss'}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============= BETTING LINE DISPLAY ==============
function BettingLineCard({ game, games, roster, compact }) {
  const line = calcBettingLine(game, games, roster);
  if (!line) return compact ? null : <div style={{padding:12,textAlign:'center',color:'var(--text-muted)',fontSize:12}}>Not enough data for a line</div>;

  const confColor = line.confidence === 'High' ? 'var(--green)' : line.confidence === 'Medium' ? 'var(--yellow)' : 'var(--text-muted)';

  if (compact) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>
        <span style={{fontWeight:700,color:'var(--brand)'}}>{line.favName} {line.fmtML(line.favTeam==='A'?line.aML:line.bML)}</span>
        <span style={{color:'var(--text-muted)'}}>-{line.absSpread}</span>
        <span style={{color:'var(--text-muted)'}}>O/U {line.projTotal}</span>
      </div>
    );
  }

  return (
    <div style={{background:'var(--bg-subtle)',border:'1px solid var(--border)',borderRadius:8,padding:20}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text-muted)'}}>BDL Line</span>
          <span style={{fontSize:9,padding:'2px 6px',borderRadius:3,background:confColor,color:'#fff',fontWeight:700}}>{line.confidence}</span>
        </div>
        <span style={{fontSize:10,color:'var(--text-muted)'}}>Based on all-time results</span>
      </div>

      {/* Main odds display */}
      <div style={{display:'flex',alignItems:'stretch',justifyContent:'space-between',gap:12}}>
        {/* Team A */}
        <div style={{flex:1,background:'var(--surface)',borderRadius:8,padding:14,textAlign:'center',border: line.favTeam==='A' ? '1.5px solid var(--brand)' : '1px solid var(--border)'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:2}}>{game.teamAName}</div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:6}}>{line.aRecord}</div>
          <div style={{fontSize:32,fontWeight:800,letterSpacing:'-0.03em',color: line.favTeam==='A' ? 'var(--brand)' : 'var(--text-primary)',lineHeight:1}}>{line.fmtML(line.aML)}</div>
          <div style={{fontSize:12,fontWeight:700,color: line.favTeam==='A' ? 'var(--brand)' : 'var(--text-muted)',marginTop:6}}>{line.aProb}%</div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{line.favTeam==='A' ? `-${line.absSpread}` : `+${line.absSpread}`}</div>
        </div>

        {/* Middle */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minWidth:80}}>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Spread</div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--text-primary)'}}>{line.favName} -{line.absSpread}</div>
          <div style={{width:1,height:16,background:'var(--border)',margin:'8px 0'}}/>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>O/U</div>
          <div style={{fontSize:18,fontWeight:800,color:'var(--text-primary)'}}>{line.projTotal}</div>
        </div>

        {/* Team B */}
        <div style={{flex:1,background:'var(--surface)',borderRadius:8,padding:14,textAlign:'center',border: line.favTeam==='B' ? '1.5px solid var(--brand)' : '1px solid var(--border)'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:2}}>{game.teamBName}</div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:6}}>{line.bRecord}</div>
          <div style={{fontSize:32,fontWeight:800,letterSpacing:'-0.03em',color: line.favTeam==='B' ? 'var(--brand)' : 'var(--text-primary)',lineHeight:1}}>{line.fmtML(line.bML)}</div>
          <div style={{fontSize:12,fontWeight:700,color: line.favTeam==='B' ? 'var(--brand)' : 'var(--text-muted)',marginTop:6}}>{line.bProb}%</div>
          <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{line.favTeam==='B' ? `-${line.absSpread}` : `+${line.absSpread}`}</div>
        </div>
      </div>

      {/* Probability bar */}
      <div style={{marginTop:14,height:8,borderRadius:4,display:'flex',overflow:'hidden'}}>
        <div style={{width:`${line.aProb}%`,background:'var(--blue)',transition:'width 0.3s'}}/>
        <div style={{width:`${line.bProb}%`,background:'var(--green)',transition:'width 0.3s'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
        <span style={{fontSize:10,color:'var(--text-muted)',fontWeight:600}}>{game.teamAName} {line.aProb}%</span>
        <span style={{fontSize:10,color:'var(--text-muted)',fontWeight:600}}>{game.teamBName} {line.bProb}%</span>
      </div>
    </div>
  );
}

// ============= GAME DETAIL (FULL PAGE) ==============

  const winLabel = wt === 'A' ? g.teamAName : wt === 'B' ? g.teamBName : wt === 'Tie' ? 'Tie' : null;

// ============= SCORE ENTRY ==============
function ScoreEntry({ game, onSave }) {
  const [sA, setSA] = useState(game.scoreA !== null ? String(game.scoreA) : '');
  const [sB, setSB] = useState(game.scoreB !== null ? String(game.scoreB) : '');
  const [winTeam, setWinTeam] = useState(game.winTeam || '');
  useEffect(() => {
    setSA(game.scoreA !== null ? String(game.scoreA) : '');
    setSB(game.scoreB !== null ? String(game.scoreB) : '');
    setWinTeam(game.winTeam || '');
  }, [game.scoreA, game.scoreB, game.winTeam]);

  // Auto-determine winner from score if both entered
  const scoreWinner = sA !== '' && sB !== '' ? (Number(sA) > Number(sB) ? 'A' : Number(sB) > Number(sA) ? 'B' : 'Tie') : null;
  const effectiveWin = scoreWinner || winTeam;
  const winLabel = effectiveWin === 'A' ? game.teamAName : effectiveWin === 'B' ? game.teamBName : effectiveWin === 'Tie' ? 'Tie' : null;

  return (
    <div>
      {/* Win/Loss Quick Pick */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:10}}>Quick Result (no score required)</div>
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          {[{val:'A',label:`${game.teamAName} Win`,color:'var(--blue)'},{val:'B',label:`${game.teamBName} Win`,color:'var(--green)'},{val:'Tie',label:'Tie',color:'var(--yellow)'}].map(opt => (
            <button key={opt.val} type="button" onClick={() => setWinTeam(winTeam === opt.val ? '' : opt.val)} style={{
              padding:'10px 20px',borderRadius:6,fontSize:11,fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',
              cursor:'pointer',border:'2px solid',fontFamily:'inherit',transition:'all 0.15s',
              background: winTeam === opt.val ? opt.color : 'transparent',
              color: winTeam === opt.val ? '#fff' : opt.color,
              borderColor: winTeam === opt.val ? opt.color : 'var(--border)',
            }}>{opt.label}</button>
          ))}
        </div>
      </div>

      <div style={{borderTop:'1px solid var(--border)',paddingTop:20}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:10,textAlign:'center'}}>Score (optional)</div>
        <div className="score-entry">
          <div>
            <div className="score-team-label">{game.teamAName}</div>
            <input className="score-input" type="number" min="0" value={sA} onChange={e => setSA(e.target.value)} placeholder="—" />
          </div>
          <div className="score-vs">VS</div>
          <div>
            <div className="score-team-label">{game.teamBName}</div>
            <input className="score-input" type="number" min="0" value={sB} onChange={e => setSB(e.target.value)} placeholder="—" />
          </div>
        </div>
      </div>

      {winLabel && <p className="winner-text" style={{marginTop:14}}>Winner: {winLabel}</p>}
      <div className="btn-group" style={{justifyContent:'center',marginTop:14}}>
        <button className="btn btn-success" onClick={() => onSave(sA, sB, winTeam)}>Save Result</button>
        <button className="btn btn-secondary" onClick={() => { setSA(''); setSB(''); setWinTeam(''); onSave('','',''); }}>Clear All</button>
      </div>
    </div>
  );
}

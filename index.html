<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDL Pickup App V2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
/* ========== RESET ========== */
*{margin:0;padding:0;box-sizing:border-box}

/* ========== ON3 DESIGN TOKENS ========== */
:root, [data-theme="light"] {
  --brand: #FE3B1F;
  --brand-hover: #e5331a;
  --bg: #F5F5F7;
  --bg-subtle: #EEEFF1;
  --surface: #FFFFFF;
  --surface-hover: #FAFAFA;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.12);
  --text-primary: #1D252C;
  --text-muted: #A1A9AC;
  --text-inverse: #FFFFFF;
  --green: #34C759;
  --green-bg: rgba(52,199,89,0.1);
  --red: #FF3B30;
  --red-bg: rgba(255,59,48,0.08);
  --blue: #007AFF;
  --blue-bg: rgba(0,122,255,0.08);
  --yellow: #FF9500;
  --yellow-bg: rgba(255,149,0,0.1);
  --brand-bg: rgba(254,59,31,0.08);
  --modal-overlay: rgba(0,0,0,0.4);
  --toast-bg: #1D252C;
  --toast-text: #FFFFFF;
  --input-bg: #F5F5F7;
}

[data-theme="dark"] {
  --bg: #1D252C;
  --bg-subtle: #252F38;
  --surface: #252F38;
  --surface-hover: #2C3640;
  --border: rgba(161,169,172,0.12);
  --border-strong: rgba(161,169,172,0.2);
  --text-primary: #FFFFFF;
  --text-muted: rgba(161,169,172,0.85);
  --text-inverse: #1D252C;
  --green-bg: rgba(52,199,89,0.15);
  --red-bg: rgba(255,59,48,0.12);
  --blue-bg: rgba(0,122,255,0.12);
  --yellow-bg: rgba(255,149,0,0.12);
  --brand-bg: rgba(254,59,31,0.12);
  --modal-overlay: rgba(0,0,0,0.6);
  --toast-bg: #FFFFFF;
  --toast-text: #1D252C;
  --input-bg: #1D252C;
}

/* ========== BASE ========== */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.2s ease, color 0.2s ease;
}

.app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 64px;
}

/* ========== HEADER ========== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-primary);
}
.header h1 .brand-mark {
  color: var(--brand);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.admin-badge {
  background: var(--brand);
  color: #fff;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Theme Toggle */
.theme-toggle {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}
.theme-toggle:hover {
  color: var(--text-primary);
  border-color: var(--border-strong);
}
.theme-toggle svg {
  width: 18px;
  height: 18px;
}

/* ========== TABS ========== */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 28px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}
.tab {
  padding: 10px 18px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
  transition: all 0.15s ease;
}
.tab:hover {
  color: var(--text-primary);
}
.tab.active {
  color: var(--brand);
  border-bottom-color: var(--brand);
}

/* ========== SECTION LABELS ========== */
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding-left: 12px;
  border-left: 2px solid var(--brand);
  margin-bottom: 16px;
}

/* ========== CARDS ========== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  transition: box-shadow 0.15s ease, background 0.2s ease;
}
.card:hover {
  box-shadow: 0 0 0 1.5px var(--brand);
}
.card-static {
  composes: card;
}
.card-static:hover {
  box-shadow: none;
}
.card h2 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.card h3 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ========== FORMS ========== */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  margin-bottom: 16px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.form-group label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
input, select, textarea {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s ease;
}
input:focus, select:focus {
  border-color: var(--brand);
}
select { cursor: pointer; }

/* ========== BUTTONS ========== */
.btn {
  padding: 10px 20px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
}
.btn-primary {
  background: var(--brand);
  color: #fff;
}
.btn-primary:hover {
  background: var(--brand-hover);
}
.btn-primary:disabled {
  background: var(--text-muted);
  opacity: 0.5;
  cursor: not-allowed;
}
.btn-secondary {
  background: var(--surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  border-color: var(--border-strong);
  background: var(--surface-hover);
}
.btn-danger {
  background: var(--red-bg);
  color: var(--red);
}
.btn-danger:hover {
  opacity: 0.85;
}
.btn-success {
  background: var(--green);
  color: #fff;
}
.btn-success:hover {
  opacity: 0.88;
}
.btn-small {
  padding: 6px 12px;
  font-size: 10px;
}
.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
}

/* ========== TABLES ========== */
.table-wrap {
  overflow-x: auto;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 10px 12px;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: transparent;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  color: var(--text-primary);
}
tr:nth-child(even) td {
  background: var(--bg-subtle);
}
tr:hover td {
  background: var(--surface-hover);
}

/* ========== STAT CARDS ========== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: left;
  transition: box-shadow 0.15s ease;
}
.stat-card:hover {
  box-shadow: 0 0 0 1.5px var(--brand);
}
.stat-card .num {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.03em;
  line-height: 1;
}
.stat-card .label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ========== BADGES ========== */
.badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge-green {
  background: var(--green-bg);
  color: var(--green);
}
.badge-red {
  background: var(--red-bg);
  color: var(--red);
}
.badge-blue {
  background: var(--blue-bg);
  color: var(--blue);
}
.badge-yellow {
  background: var(--yellow-bg);
  color: var(--yellow);
}
.badge-brand {
  background: linear-gradient(135deg, #FFD700, #FFC107, #FFB300);
  color: #000;
  font-weight: 800;
  text-shadow: 0 1px 1px rgba(255,215,0,0.3);
  border: 1px solid #DAA520;
  animation: goldShimmer 3s ease infinite;
}
@keyframes goldShimmer {
  0%, 100% { box-shadow: 0 0 4px rgba(255,215,0,0.3); }
  50% { box-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.2); }
}
.badge-gc {
  background: linear-gradient(135deg, rgba(254,59,31,0.15), rgba(255,149,0,0.15));
  color: #fff;
  border: none;
  background: linear-gradient(135deg, #FF9500, #FE3B1F);
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.badge-novice {
  background: var(--green-bg);
  color: var(--green);
}
.badge-muted {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--text-muted);
}

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--modal-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  max-width: 600px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}
.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}
.modal-close:hover {
  color: var(--text-primary);
  background: var(--bg-subtle);
}

/* ========== LOGIN ========== */
.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 85vh;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  max-width: 380px;
  width: 100%;
  text-align: center;
}
.login-box h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -0.03em;
  color: var(--text-primary);
}
.login-box h1 .brand-mark {
  color: var(--brand);
}
.login-box p {
  color: var(--text-muted);
  margin-bottom: 28px;
  font-size: 13px;
}
.login-box input {
  width: 100%;
  margin-bottom: 12px;
}
.login-box .btn {
  width: 100%;
  justify-content: center;
  margin-top: 6px;
  padding: 12px 20px;
  font-size: 12px;
}
.login-error {
  color: var(--red);
  font-size: 13px;
  margin-bottom: 10px;
}
.login-hint {
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

/* ========== LOGIN ROLE TOGGLE ========== */
.login-role-toggle {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.login-role-btn {
  flex: 1;
  padding: 10px 0;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}
.login-role-btn.active {
  background: var(--brand);
  color: #fff;
}
.login-role-btn:not(.active):hover {
  background: var(--bg-subtle);
  color: var(--text-primary);
}

/* Verification Code */
.verify-code-display {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin: 16px 0;
  text-align: center;
}
.verify-code-display .label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.verify-code-display .code {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 0.15em;
  color: var(--brand);
}
.verify-code-display .method {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
}
.verify-input {
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.15em;
}

/* Player badge */
.player-badge {
  background: var(--blue);
  color: #fff;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Signup link */
.login-link {
  color: var(--brand);
  cursor: pointer;
  font-weight: 600;
  font-size: 12px;
}
.login-link:hover {
  text-decoration: underline;
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--toast-bg);
  color: var(--toast-text);
  padding: 14px 20px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 13px;
  z-index: 200;
  animation: slideUp 0.25s ease;
  letter-spacing: -0.01em;
}
@keyframes slideUp {
  from { transform: translateY(12px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* ========== PLAYER CHIPS ========== */
.player-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 12px;
  margin: 2px;
  font-weight: 500;
  color: var(--text-primary);
}
.player-chip .remove {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1;
  margin-left: 2px;
}
.player-chip .remove:hover {
  color: var(--red);
}

/* ========== TEAM COLUMNS ========== */
.teams-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: start;
  margin-top: 16px;
}
.team-col {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  min-height: 180px;
}
.team-col h3 {
  text-align: center;
  margin-bottom: 12px;
  font-size: 11px;
  color: var(--brand);
}
.vs-col {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: var(--text-muted);
  padding-top: 60px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.available-player {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 6px;
  font-size: 13px;
}
.available-player .name {
  font-weight: 600;
  color: var(--text-primary);
}
.available-player .level {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.available-player .actions {
  display: flex;
  gap: 4px;
}
.assign-btn {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  transition: all 0.15s ease;
  font-family: inherit;
}
.assign-btn:hover {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
}
.assign-btn.a-btn:hover {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.assign-btn.b-btn:hover {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

/* Lock indicator */
.locked-card {
  border: 1.5px solid var(--brand) !important;
}

/* ========== SCORE ENTRY ========== */
.score-entry {
  display: flex;
  align-items: center;
  gap: 16px;
  justify-content: center;
  margin-top: 16px;
}
.score-input {
  width: 120px;
  text-align: center;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.03em;
  padding: 12px;
  background: var(--input-bg);
  color: var(--text-primary);
}
.score-vs {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.score-team-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

/* ========== SEARCH ========== */
.search-bar { margin-bottom: 16px; }
.search-bar input { width: 100%; max-width: 360px; }

/* ========== EMPTY STATE ========== */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}
.empty .icon {
  font-size: 32px;
  margin-bottom: 10px;
  opacity: 0.5;
}
.empty p {
  font-size: 13px;
}

/* ========== WINNER TEXT ========== */
.winner-text {
  text-align: center;
  margin-top: 14px;
  font-weight: 700;
  font-size: 13px;
  color: var(--green);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ========== CONFIRM MODAL ========== */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: var(--modal-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 150;
  padding: 16px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  animation: confirmFadeIn 0.15s ease;
}
@keyframes confirmFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  max-width: 380px;
  width: 100%;
  text-align: center;
}
.confirm-box .confirm-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--red-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
}
.confirm-box .confirm-icon svg {
  width: 22px;
  height: 22px;
  color: var(--red);
}
.confirm-box h3 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ============= DATA HELPERS ==============
const save = (key, data) => localStorage.setItem(`bdl_${key}`, JSON.stringify(data));
const load = (key, fallback) => { try { return JSON.parse(localStorage.getItem(`bdl_${key}`)) || fallback; } catch { return fallback; } };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const calcAge = (bday) => {
  if (!bday) return null;
  const b = new Date(bday + 'T00:00:00');
  const today = new Date();
  let age = today.getFullYear() - b.getFullYear();
  const m = today.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
  return age;
};

// ============= DATE FORMATTING ==============
const fmtGameDate = (dateStr) => {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
};
const fmtTime = (timeStr) => {
  if (!timeStr) return 'TBD';
  const [h,m] = timeStr.split(':');
  const hr = Number(h);
  return `${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`;
};
const fmtHeight = (p) => {
  if (!p || !p.heightFt) return null;
  const inches = p.heightIn ? p.heightIn : '0';
  return `${p.heightFt}'${inches}"${p.heightNoShoes ? ' (ns)' : ''}`;
};
// ============= SKILL RATING ENGINE ==============
// ============= FORMAT & SERIES ==============
const FORMAT_OPTIONS = [
  {value:'5v5',label:'5 x 5 — Single Game'},
  {value:'5v5-series',label:'5 x 5 — Series'},
  {value:'3v3',label:'3 x 3 — Single Game'},
  {value:'3v3-series',label:'3 x 3 — Series'},
];
const FORMAT_LABEL = (f) => (FORMAT_OPTIONS.find(o=>o.value===f)||{}).label || f || '5v5';
const isSeries = (f) => f && f.includes('-series');
const SERIES_OPTIONS = [{value:3,label:'Best of 3'},{value:5,label:'Best of 5'},{value:7,label:'Best of 7'},{value:9,label:'Best of 9'}];
const getSeriesStatus = (seriesId, games) => {
  if (!seriesId) return null;
  const seriesGames = games.filter(g => g.seriesId === seriesId).sort((a,b) => (a.gameDate||'').localeCompare(b.gameDate||''));
  const bestOf = seriesGames[0]?.seriesBestOf || 3;
  const winsNeeded = Math.ceil(bestOf / 2);
  let aWins = 0, bWins = 0;
  seriesGames.forEach(g => { const wt = getGameWinTeam(g); if (wt==='A') aWins++; else if (wt==='B') bWins++; });
  const winner = aWins >= winsNeeded ? 'A' : bWins >= winsNeeded ? 'B' : null;
  return { seriesGames, bestOf, winsNeeded, aWins, bWins, winner, total: seriesGames.length };
};

const LEVEL_TO_NUM = {'Pro':100,'Game Changer':88,'Advanced':75,'Intermediate':50,'Novice':25,'Not Rated':0};
const NUM_TO_LEVEL = (n) => n >= 94 ? 'Pro' : n >= 81 ? 'Game Changer' : n >= 62 ? 'Advanced' : n >= 37 ? 'Intermediate' : n > 0 ? 'Novice' : 'Not Rated';

const calcBlendedLevel = (player, leagueId) => {
  // Commissioner rating (50%)
  const commLevel = (player.leagueLevels||{})[leagueId] || 'Not Rated';
  const commScore = LEVEL_TO_NUM[commLevel] || 0;
  const hasComm = commLevel !== 'Not Rated';

  // Self rating (25%)
  const selfLevel = (player.selfRatings||{})[leagueId] || 'Not Rated';
  const selfScore = LEVEL_TO_NUM[selfLevel] || 0;
  const hasSelf = selfLevel !== 'Not Rated';

  // Peer ratings (25%) — average of all peer votes
  const peerObj = (player.peerRatings||{})[leagueId] || {};
  const peerVotes = Object.values(peerObj).filter(v => v && v !== 'Not Rated');
  const peerScore = peerVotes.length > 0 ? peerVotes.reduce((s,v) => s + (LEVEL_TO_NUM[v]||0), 0) / peerVotes.length : 0;
  const hasPeer = peerVotes.length > 0;

  // If nothing rated, return Not Rated
  if (!hasComm && !hasSelf && !hasPeer) return { level: 'Not Rated', score: 0, hasData: false };

  // Weighted blend (only count sources that have data)
  let totalWeight = 0, totalScore = 0;
  if (hasComm) { totalWeight += 50; totalScore += commScore * 50; }
  if (hasSelf) { totalWeight += 25; totalScore += selfScore * 25; }
  if (hasPeer) { totalWeight += 25; totalScore += peerScore * 25; }

  const blended = totalWeight > 0 ? totalScore / totalWeight : 0;
  return { level: NUM_TO_LEVEL(blended), score: Math.round(blended), hasData: true, commLevel, selfLevel, peerScore: hasPeer ? Math.round(peerScore) : null, peerCount: peerVotes.length };
};

const isGameComplete = (g) => (g.scoreA !== null && g.scoreB !== null) || !!g.winTeam;
const getGameWinTeam = (g) => {
  if (g.scoreA !== null && g.scoreB !== null) return g.scoreA > g.scoreB ? 'A' : g.scoreB > g.scoreA ? 'B' : 'Tie';
  return g.winTeam || null;
};

// ============= BETTING LINE ENGINE ==============
const calcBettingLine = (game, allGames, roster) => {
  const teamAIds = game.teamA || [];
  const teamBIds = game.teamB || [];
  if (teamAIds.length === 0 && teamBIds.length === 0) return null;

  const completed = allGames.filter(g => isGameComplete(g) && g.id !== game.id);
  if (completed.length < 3) return null;

  // 1. Player win rates
  const playerStats = {};
  completed.forEach(g => {
    const wt = getGameWinTeam(g);
    [...(g.teamA||[]), ...(g.teamB||[])].forEach(pid => {
      if (!playerStats[pid]) playerStats[pid] = { w:0, l:0, gp:0, pf:0, pa:0 };
      playerStats[pid].gp++;
      const onA = (g.teamA||[]).includes(pid);
      const hs = g.scoreA !== null && g.scoreB !== null;
      if (hs) {
        playerStats[pid].pf += onA ? g.scoreA : g.scoreB;
        playerStats[pid].pa += onA ? g.scoreB : g.scoreA;
      }
      if ((onA && wt==='A') || (!onA && wt==='B')) playerStats[pid].w++;
      else if (wt && wt !== 'Tie') playerStats[pid].l++;
    });
  });

  // 2. Calculate team strength (avg win rate of players)
  const teamStrength = (ids) => {
    const rated = ids.filter(id => playerStats[id] && playerStats[id].gp >= 2);
    if (rated.length === 0) return 0.5;
    const totalWinRate = rated.reduce((s, id) => {
      const ps = playerStats[id];
      return s + (ps.gp > 0 ? ps.w / ps.gp : 0.5);
    }, 0);
    return totalWinRate / rated.length;
  };

  // 3. Average point differential per player
  const teamAvgDiff = (ids) => {
    const rated = ids.filter(id => playerStats[id] && playerStats[id].pf > 0);
    if (rated.length === 0) return 0;
    const totalDiff = rated.reduce((s, id) => {
      const ps = playerStats[id];
      return s + (ps.pf - ps.pa) / ps.gp;
    }, 0);
    return totalDiff / rated.length;
  };

  const aStr = teamStrength(teamAIds);
  const bStr = teamStrength(teamBIds);
  const aDiff = teamAvgDiff(teamAIds);
  const bDiff = teamAvgDiff(teamBIds);

  // 4. Roster size factor (more players = slight advantage in pickup)
  const sizeFactor = (teamAIds.length - teamBIds.length) * 0.5;

  // 5. Combine into projected spread
  const winRateEdge = (aStr - bStr) * 20; // win rate difference scaled
  const diffEdge = (aDiff - bDiff) * 0.4; // historical +/- contribution
  const rawSpread = winRateEdge + diffEdge + sizeFactor;
  const spread = Math.round(rawSpread * 2) / 2; // round to nearest 0.5

  // 6. Win probability
  const prob = 1 / (1 + Math.exp(-rawSpread / 4)); // logistic function
  const aProb = Math.round(prob * 100);
  const bProb = 100 - aProb;

  // 7. Projected total (based on league averages)
  const scoredGames = completed.filter(g => g.scoreA !== null && g.scoreB !== null);
  const avgTotal = scoredGames.length > 0 ? scoredGames.reduce((s,g) => s + g.scoreA + g.scoreB, 0) / scoredGames.length : 280;
  const projTotal = Math.round(avgTotal);

  const favTeam = spread >= 0 ? 'A' : 'B';
  const absSpread = Math.abs(spread);
  const favName = favTeam === 'A' ? game.teamAName : game.teamBName;
  const dogName = favTeam === 'A' ? game.teamBName : game.teamAName;
  const favProb = favTeam === 'A' ? aProb : bProb;
  const dogProb = favTeam === 'A' ? bProb : aProb;
  const confidence = absSpread >= 5 ? 'High' : absSpread >= 2 ? 'Medium' : 'Low';

  // Moneyline odds (American format)
  const toMoneyline = (pct) => {
    if (pct >= 100) return -9999;
    if (pct <= 0) return 9999;
    const p = pct / 100;
    return p >= 0.5 ? Math.round(-100 * p / (1 - p)) : Math.round(100 * (1 - p) / p);
  };
  const aML = toMoneyline(aProb);
  const bML = toMoneyline(bProb);
  const fmtML = (ml) => ml > 0 ? `+${ml}` : String(ml);

  // Record: team W-L in all-time data
  const teamRecord = (teamName) => {
    let w=0, l=0;
    completed.forEach(g => {
      const wt = getGameWinTeam(g);
      if (g.teamAName === teamName) { if (wt==='A') w++; else if (wt==='B') l++; }
      if (g.teamBName === teamName) { if (wt==='B') w++; else if (wt==='A') l++; }
    });
    return `${w}-${l}`;
  };
  const aRecord = teamRecord(game.teamAName);
  const bRecord = teamRecord(game.teamBName);

  return { spread, absSpread, favTeam, favName, dogName, favProb, dogProb, aProb, bProb, projTotal, confidence, aStr, bStr, aML, bML, fmtML, aRecord, bRecord };
};

// ============= AUTO-SCHEDULE ==============
const dayMap = { 'Mon':1, 'Tue':2, 'Wed':3, 'Thu':4, 'Fri':5, 'Sat':6, 'Sun':0 };

const generateLeagueSchedule = (league, existingGames, weeksAhead = 5) => {
  if (league.frequencyType === 'random') return [];
  const gameDays = league.gameDays || [];
  if (gameDays.length === 0) return [];

  const today = new Date();
  today.setHours(0,0,0,0);
  const endDate = new Date(today);
  endDate.setDate(endDate.getDate() + (weeksAhead * 7));

  // Get dates of existing games for this league to avoid duplicates
  const existingDates = new Set(
    existingGames
      .filter(g => g.leagueId === league.id || g.leagueName === league.name)
      .map(g => g.gameDate)
      .filter(Boolean)
  );

  const newGames = [];
  const cursor = new Date(today);
  cursor.setDate(cursor.getDate() + 1); // start from tomorrow

  while (cursor <= endDate) {
    const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][cursor.getDay()];
    if (gameDays.includes(dayName)) {
      const dateStr = cursor.toISOString().slice(0,10);
      if (!existingDates.has(dateStr)) {
        newGames.push({
          id: uid(),
          leagueId: league.id,
          leagueName: league.name,
          teamAName: league.teamAName || 'Team A',
          teamBName: league.teamBName || 'Team B',
          format: league.format || '5v5',
          numInvites: league.format === '3v3' ? 6 : 10,
          gameDate: dateStr,
          gameTime: (league.startTimeType === 'fixed' && league.startTime) ? league.startTime : '',
          location: league.address || league.location || '',
          locationOverride: false,
          teamA: [],
          teamB: [],
          invited: [],
          scoreA: null,
          scoreB: null,
          locked: false,
          autoScheduled: true,
        });
      }
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return newGames;
};

// ============= ADMIN CREDENTIALS ==============
const ADMIN_PASS = 'bdl2026';

// ============= INVITE SYSTEM ==============
const createInvite = (leagueId, leagueName, firstName, lastName, email, cell, invitedBy) => {
  const invites = load('invites', []);
  const invite = { id: uid(), leagueId, leagueName, firstName, lastName, email: email||'', cell: cell||'', invitedBy, createdAt: new Date().toISOString(), status: 'pending', playerId: null };
  invites.push(invite);
  save('invites', invites);
  return invite;

// ============= THEME TOGGLE ==============
function ThemeToggle() {
  const [dark, setDark] = useState(() => {
    const saved = localStorage.getItem('bdl_theme');
    return saved === 'dark';
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    localStorage.setItem('bdl_theme', dark ? 'dark' : 'light');
  }, [dark]);
  return (
    <button className="theme-toggle" onClick={() => setDark(!dark)} aria-label="Toggle theme">
      {dark ? <SunIcon /> : <MoonIcon />}
    </button>
  );
}

function InviteSignup({ invite, roster, setRoster, onComplete }) {
  const [phase, setPhase] = useState(1); // 1=basic, 2=optional
  const [form, setForm] = useState({ firstName: invite.firstName||'', lastName: invite.lastName||'', email: invite.email||'', cell: invite.cell||'' });
  const [optForm, setOptForm] = useState({ position:'', sport:'', heightFt:'', heightIn:'', weight:'', city:'', state:'', zip:'', college:'', highestLevel:'' });
  const [err, setErr] = useState('');

  const handlePhase1 = () => {
    if (!form.firstName || !form.lastName) { setErr('Name is required.'); return; }
    if (!form.email && !form.cell) { setErr('Email or cell is required.'); return; }
    const exists = roster.find(p => (form.email && p.email && p.email.toLowerCase()===form.email.toLowerCase()) || (form.cell && p.cell && p.cell.replace(/\D/g,'')===form.cell.replace(/\D/g,'')));
    if (exists) { setErr('Account already exists. Go to login.'); return; }
    setPhase(2);
  };

  const handleComplete = () => {
    const newPlayer = { ...form, ...optForm, id: uid(), level:'Not Rated', leagueIds:[invite.leagueId], leagueTeams:{[invite.leagueId]:'Swing'}, leagueLevels:{[invite.leagueId]:'Not Rated'}, selfRatings:{}, peerRatings:{}, cellPrivate:false, emailPrivate:false, addressPrivate:false, heightNoShoes:false, birthday:'', address:'', status:'Active', statusDate:'', statusNote:'', statusIndefinite:false, injuryLocation:'' };
    const updated = [...roster, newPlayer];
    setRoster(updated);
    // Mark invite as accepted
    const invites = load('invites', []);
    const inv = invites.find(i => i.id === invite.id);
    if (inv) { inv.status = 'accepted'; inv.playerId = newPlayer.id; save('invites', invites); }
    onComplete(newPlayer);
  };

  return (
    <div style={{background:'var(--bg)',minHeight:'100vh'}}>
      <div style={{display:'flex',justifyContent:'flex-end',padding:'16px 20px'}}><ThemeToggle /></div>
      <div className="login-wrap">
        <div className="login-box" style={{maxWidth:440}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:20}}><BDLLogo size="large" /></div>
          <p style={{fontSize:15,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>You're Invited!</p>
          <p style={{color:'var(--text-muted)',fontSize:12,marginBottom:20}}>Join <strong style={{color:'var(--text-primary)'}}>{invite.leagueName}</strong> on BDL Pickup</p>

          {phase === 1 && (
            <div>
              <div style={{textAlign:'left',marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',paddingLeft:10,borderLeft:'2px solid var(--brand)'}}>Step 1 — Basic Info</div>
              </div>
              {err && <div className="login-error">{err}</div>}
              <input placeholder="First Name *" value={form.firstName} onChange={e => setForm({...form, firstName:e.target.value})} />
              <input placeholder="Last Name *" value={form.lastName} onChange={e => setForm({...form, lastName:e.target.value})} />
              <input placeholder="Email" type="email" value={form.email} onChange={e => setForm({...form, email:e.target.value})} />
              <input placeholder="Cell (555-555-5555)" value={form.cell} onChange={e => setForm({...form, cell:e.target.value})} />
              <button className="btn btn-primary" onClick={handlePhase1}>Continue</button>
            </div>
          )}

          {phase === 2 && (
            <div>
              <div style={{textAlign:'left',marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-muted)',paddingLeft:10,borderLeft:'2px solid var(--green)'}}>Step 2 — Complete Your Profile (Optional)</div>
              </div>
              <select value={optForm.position} onChange={e => setOptForm({...optForm, position:e.target.value})} style={{width:'100%',marginBottom:12}}>
                {['','PG','SG','SF','PF','C','G','F'].map(pos => <option key={pos} value={pos}>{pos ? ({'PG':'Point Guard','SG':'Shooting Guard','SF':'Small Forward','PF':'Power Forward','C':'Center','G':'Guard','F':'Forward'})[pos] : 'Position...'}</option>)}
              </select>
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <select value={optForm.heightFt} onChange={e => setOptForm({...optForm, heightFt:e.target.value})} style={{flex:1}}><option value="">Height (ft)</option>{[4,5,6,7].map(f=><option key={f} value={String(f)}>{f}'</option>)}</select>
                <select value={optForm.heightIn} onChange={e => setOptForm({...optForm, heightIn:e.target.value})} style={{flex:1}}><option value="">In</option>{[0,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10,10.5,11,11.5].map(i=><option key={i} value={String(i)}>{i}"</option>)}</select>
                <input placeholder="Weight" value={optForm.weight} onChange={e => setOptForm({...optForm, weight:e.target.value})} style={{flex:1}} />
              </div>
              <input placeholder="City" value={optForm.city} onChange={e => setOptForm({...optForm, city:e.target.value})} style={{width:'100%',marginBottom:12}} />
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <input placeholder="Zip" value={optForm.zip} onChange={e => setOptForm({...optForm, zip:e.target.value})} style={{flex:1}} />
                <input placeholder="College" value={optForm.college} onChange={e => setOptForm({...optForm, college:e.target.value})} style={{flex:2}} />
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-primary" onClick={handleComplete}>Create Account</button>
                <button className="btn btn-secondary" onClick={handleComplete}>Skip &amp; Join</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  // Check for invite URL parameter
  const [inviteParam] = useState(() => { const p = new URLSearchParams(window.location.search); return p.get('invite'); });
  const [inviteHandled, setInviteHandled] = useState(false);

  const [loggedIn, setLoggedIn] = useState(load('loggedIn', false));
  const [userRole, setUserRole] = useState(load('userRole', null));
  const [currentPlayer, setCurrentPlayer] = useState(load('currentPlayer', null));
  const [tab, setTab] = useState('dashboard');
  const [roster, setRoster] = useState(load('roster', []));
  const [leagues, setLeagues] = useState(load('leagues', []));
  const [games, setGames] = useState(load('games', []));
  const [toast, setToast] = useState(null);
  const [viewGameId, setViewGameId] = useState(null);

  useEffect(() => { save('roster', roster); }, [roster]);
  useEffect(() => { save('leagues', leagues); }, [leagues]);
  useEffect(() => { save('games', games); }, [games]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
  const onViewGame = (gid) => setViewGameId(gid);

  const handleLogin = (role, player) => {
    setLoggedIn(true); setUserRole(role); setCurrentPlayer(player || null);
    save('loggedIn', true); save('userRole', role); save('currentPlayer', player || null);
  };

  const handleLogout = () => {
    setLoggedIn(false); setUserRole(null); setCurrentPlayer(null); setTab('dashboard');
    save('loggedIn', false); save('userRole', null); save('currentPlayer', null);
  };

  // Handle invite link
  if (inviteParam && !inviteHandled) {
    const invites = load('invites', []);
    const invite = invites.find(i => i.id === inviteParam && i.status === 'pending');
    if (invite) {
      return <InviteSignup invite={invite} roster={roster} setRoster={(r) => { setRoster(r); save('roster', r); }} onComplete={(player) => {
        setInviteHandled(true);
        handleLogin('player', player);
        window.history.replaceState({}, '', window.location.pathname);
      }} />;
    }
  }

  if (!loggedIn) return <LoginScreen onLogin={handleLogin} roster={roster} setRoster={(r) => { setRoster(r); save('roster', r); }} leagues={leagues} setLeagues={(l) => { setLeagues(l); save('leagues', l); }} />;

  const [viewAs, setViewAs] = useState('admin'); // 'admin' | 'commissioner' | 'player'

  const trueAdmin = userRole === 'admin';
  const isAdmin = trueAdmin && viewAs === 'admin';
  const isCommissioner = viewAs === 'commissioner';
  const isPlayerView = viewAs === 'player';

  // Keep currentPlayer in sync with roster
  const livePlayer = currentPlayer ? roster.find(p => p.id === currentPlayer.id) || currentPlayer : null;

  // Determine commissioner leagues for this player
  const commissionerLeagues = livePlayer ? leagues.filter(l => (l.commissioners||[]).includes(livePlayer.id)) : [];

  const tabs = isAdmin ? [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'roster', label: 'Roster' },
    { id: 'leagues', label: 'Leagues' },
    { id: 'games', label: 'Games' },
    { id: 'standings', label: 'Standings' },
    { id: 'leaderboard', label: 'Leaderboard' },
  ] : isCommissioner ? [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'roster', label: 'Roster' },
    { id: 'leagues', label: 'My Leagues' },
    { id: 'games', label: 'Games' },
    { id: 'standings', label: 'Standings' },
    { id: 'leaderboard', label: 'Leaderboard' },
    { id: 'profile', label: 'My Profile' },
  ] : [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'profile', label: 'My Profile' },
    { id: 'leagues', label: 'Leagues' },
    { id: 'games', label: 'Games' },
    { id: 'standings', label: 'Standings' },
    { id: 'leaderboard', label: 'Leaderboard' },
  ];

  // Reset tab if current tab not in new tabs
  useEffect(() => {
    if (!tabs.find(t => t.id === tab)) setTab('dashboard');
  }, [viewAs]);

  const GearIcon = () => (
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  );

  return (
    <div className="app">
      <header className="header">
        <BDLLogo />
        <div className="header-right">
          {/* User identity */}
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            {isAdmin ? (
              <span className="admin-badge">{livePlayer ? `${livePlayer.firstName} ${livePlayer.lastName}` : 'Admin'}</span>
            ) : isCommissioner ? (
              <span className="commish-badge" style={{fontSize:10,padding:'4px 10px',borderRadius:100}}>{livePlayer ? `${livePlayer.firstName} ${livePlayer.lastName}` : 'Commissioner'}</span>
            ) : (
              <span className="player-badge">{livePlayer ? `${livePlayer.firstName} ${livePlayer.lastName}` : 'Player'}</span>
            )}
          </div>
          {/* Role switcher + controls */}
          {trueAdmin && (
            <div className="role-switcher">
              <button className={viewAs==='admin'?'active-admin':''} onClick={()=>setViewAs('admin')}>Admin</button>
              <button className={viewAs==='commissioner'?'active-commish':''} onClick={()=>setViewAs('commissioner')}>Commish</button>
              <button className={viewAs==='player'?'active-player':''} onClick={()=>setViewAs('player')}>Player</button>
            </div>
          )}
          {isAdmin && (
            <button className="theme-toggle" onClick={() => setTab('admin')} aria-label="Settings" title="Settings"><GearIcon /></button>
          )}
          <ThemeToggle />
          <button className="btn btn-secondary btn-small" onClick={handleLogout}>Logout</button>
        </div>
      </header>
      <nav className="tabs">
        {tabs.map(t => (
          <button key={t.id} className={`tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>{t.label}</button>
        ))}
      </nav>
      {viewGameId ? <GameDetail gameId={viewGameId} games={games} setGames={setGames} roster={roster} leagues={leagues} showToast={showToast} onClose={() => setViewGameId(null)} isAdmin={isAdmin || isCommissioner} /> : (
        <div>
          {tab === 'dashboard' && <Dashboard roster={roster} leagues={leagues} games={games} setTab={setTab} onViewGame={onViewGame} />}
          {tab === 'roster' && isAdmin && <Roster roster={roster} setRoster={setRoster} leagues={leagues} games={games} onViewGame={onViewGame} />}
          {tab === 'roster' && isCommissioner && (() => {
            const commLeagueIds = commissionerLeagues.map(l => l.id);
            const commRoster = roster.filter(p => (p.leagueIds||[]).some(lid => commLeagueIds.includes(lid)));
            return (
              <div>
                <div className="commish-banner">Commissioner View — Showing players in your leagues only.</div>
                <Roster roster={commRoster} setRoster={setRoster} leagues={commissionerLeagues} games={games} onViewGame={onViewGame} />
              </div>
            );
          })()}
          {tab === 'leagues' && isAdmin && <Leagues leagues={leagues} setLeagues={setLeagues} roster={roster} setRoster={setRoster} games={games} setGames={setGames} showToast={showToast} onViewGame={onViewGame} />}
          {tab === 'leagues' && isCommissioner && (
            <div>
              <div className="commish-banner">Commissioner View — You can manage leagues where you are a commissioner.</div>
              <Leagues leagues={commissionerLeagues.length > 0 ? commissionerLeagues : leagues} setLeagues={setLeagues} roster={roster} setRoster={setRoster} games={games} setGames={setGames} showToast={showToast} onViewGame={onViewGame} />
            </div>
          )}
          {tab === 'leagues' && isPlayerView && (
            <Leagues leagues={livePlayer ? leagues.filter(l => (livePlayer.leagueIds||[]).includes(l.id)) : leagues} setLeagues={null} roster={roster} setRoster={null} games={games} setGames={null} showToast={null} onViewGame={onViewGame} />
          )}
          {tab === 'games' && (isAdmin || isCommissioner) && <Games games={games} setGames={setGames} roster={roster} leagues={leagues} showToast={showToast} onViewGame={onViewGame} />}
          {tab === 'games' && isPlayerView && <Games games={games} setGames={setGames} roster={roster} leagues={leagues} showToast={showToast} onViewGame={onViewGame} />}
          {tab === 'standings' && <StandingsPage games={games} leagues={leagues} onViewGame={onViewGame} />}
          {tab === 'leaderboard' && <Leaderboard games={games} leagues={leagues} roster={roster} />}
          {tab === 'admin' && isAdmin && <AdminSettings roster={roster} showToast={showToast} />}
          {tab === 'profile' && (isCommissioner || isPlayerView) && livePlayer && <PlayerProfile player={livePlayer} leagues={leagues} games={games} onViewGame={onViewGame} roster={roster} setRoster={setRoster} showToast={showToast} />}
        </div>
      )}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ============= LOGIN ==============
function LoginScreen({ onLogin, roster, setRoster, leagues, setLeagues }) {
  const [role, setRole] = useState('player'); // 'admin' | 'player'
  const [screen, setScreen] = useState('login'); // 'login' | 'verify' | 'signup' | 'signup-commish'
  // Admin fields
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  // Player fields
  const [lookup, setLookup] = useState('');
  const [foundPlayer, setFoundPlayer] = useState(null);
  const [verifyCode, setVerifyCode] = useState('');
  const [generatedCode, setGeneratedCode] = useState('');
  const [verifyMethod, setVerifyMethod] = useState('');
  // Signup fields
  const [signupForm, setSignupForm] = useState({ firstName:'', lastName:'', cell:'', email:'' });
  // Commissioner signup fields
  const [commishLeagueForm, setCommishLeagueForm] = useState({ leagueName:'', teamAName:'White', teamBName:'Dark', format:'5v5', leagueType:'closed' });
  const [err, setErr] = useState('');

  const generateCode = () => String(Math.floor(100000 + Math.random() * 900000));

  // Admin login
  const handleAdminLogin = () => {
    const superAdmins = load('superAdmins', []);
    const adminMatch = superAdmins.find(a => a.username.toLowerCase() === user.toLowerCase());
    if (adminMatch && pass === ADMIN_PASS) {
      const linkedPlayer = adminMatch.playerId ? roster.find(p => p.id === adminMatch.playerId) : null;
      onLogin('admin', linkedPlayer || null);
    }
    else { setErr('Invalid credentials.'); }
  };

  // Player lookup
  const handlePlayerLookup = () => {
    const q = lookup.trim().toLowerCase();
    if (!q) { setErr('Enter your email or cell number.'); return; }
    const found = roster.find(p =>
      (p.email && p.email.toLowerCase() === q) ||
      (p.cell && p.cell.replace(/\D/g,'') === q.replace(/\D/g,''))
    );
    if (found) {
      const code = generateCode();
      setGeneratedCode(code);
      setFoundPlayer(found);
      const method = (found.email && found.email.toLowerCase() === q) ? `email (${found.email})` :
                     (found.cell) ? `cell (${found.cell})` : 'account';
      setVerifyMethod(method);
      setScreen('verify');
      setErr('');
    } else {
      setErr('No player found with that email or cell. Sign up below.');
    }
  };

  // Verify code
  const handleVerify = () => {
    if (verifyCode === generatedCode) {
      onLogin('player', foundPlayer);
    } else {
      setErr('Incorrect code. Please try again.');
    }
  };

  // Signup
  const handleSignup = () => {
    if (!signupForm.firstName || !signupForm.lastName) { setErr('First and last name are required.'); return; }
    if (!signupForm.email && !signupForm.cell) { setErr('Email or cell is required to verify your account.'); return; }
    // Check if already exists
    const exists = roster.find(p =>
      (signupForm.email && p.email && p.email.toLowerCase() === signupForm.email.toLowerCase()) ||
      (signupForm.cell && p.cell && p.cell.replace(/\D/g,'') === signupForm.cell.replace(/\D/g,''))
    );
    if (exists) {
      setErr('A player with that email or cell already exists. Go back and log in.');
      return;
    }
    const newPlayer = { ...signupForm, id: uid(), city:'', state:'', college:'', level:'Not Rated', highestLevel:'', sport:'', leagueIds:[], leagueTeams:{}, leagueLevels:{}, cellPrivate:false, emailPrivate:false, heightFt:'', heightIn:'', heightNoShoes:false, weight:'', birthday:'', status:'Active', statusDate:'', statusNote:'', statusIndefinite:false, injuryLocation:'' };
    const updated = [...roster, newPlayer];
    setRoster(updated);
    const code = generateCode();
    setGeneratedCode(code);
    setFoundPlayer(newPlayer);
    setVerifyMethod(signupForm.email ? `email (${signupForm.email})` : `cell (${signupForm.cell})`);
    setScreen('verify');
    setErr('');
  };

  // Commissioner Signup — create player + league
  const handleCommishSignup = () => {
    if (!signupForm.firstName || !signupForm.lastName) { setErr('First and last name are required.'); return; }
    if (!signupForm.email && !signupForm.cell) { setErr('Email or cell is required.'); return; }
    if (!commishLeagueForm.leagueName) { setErr('League name is required.'); return; }
    // Check if player exists
    const exists = roster.find(p =>
      (signupForm.email && p.email && p.email.toLowerCase() === signupForm.email.toLowerCase()) ||
      (signupForm.cell && p.cell && p.cell.replace(/\D/g,'') === signupForm.cell.replace(/\D/g,''))
    );
    if (exists) { setErr('A player with that email or cell already exists. Log in instead.'); return; }
    // Create player
    const newPlayer = { ...signupForm, id: uid(), city:'', state:'', college:'', level:'Not Rated', highestLevel:'', sport:'', leagueIds:[], leagueTeams:{}, leagueLevels:{}, cellPrivate:false, emailPrivate:false, heightFt:'', heightIn:'', heightNoShoes:false, weight:'', birthday:'', status:'Active', statusDate:'', statusNote:'', statusIndefinite:false, injuryLocation:'' };
    // Create league
    const newLeague = {
      id: uid(), name: commishLeagueForm.leagueName,
      teamAName: commishLeagueForm.teamAName || 'Team A',
      teamBName: commishLeagueForm.teamBName || 'Team B',
      format: commishLeagueForm.format || '5v5',
      level: 'Not Rated', daysPerWeek: 1, gameDays: [], frequencyType: 'random',
      commissioners: [newPlayer.id], startTimeType: 'tbd', startTime: '', location: '',
      leagueType: commishLeagueForm.leagueType || 'closed',
    };
    // Assign player to league
    newPlayer.leagueIds = [newLeague.id];
    // Save
    const updatedRoster = [...roster, newPlayer];
    setRoster(updatedRoster);
    setLeagues([...(leagues||[]), newLeague]);
    // Verify
    const code = generateCode();
    setGeneratedCode(code);
    setFoundPlayer(newPlayer);
    setVerifyMethod(signupForm.email ? `email (${signupForm.email})` : `cell (${signupForm.cell})`);
    setScreen('verify');
    setErr('');
  };

  return (
    <div style={{background:'var(--bg)',minHeight:'100vh'}}>
      <div style={{display:'flex',justifyContent:'flex-end',padding:'16px 20px'}}>
        <ThemeToggle />
      </div>
      <div className="login-wrap">
        <div className="login-box">
          <div style={{display:'flex',justifyContent:'center',marginBottom:20}}><BDLLogo size="large" /></div>

          {screen === 'login' && (
            <div>
              <div className="login-role-toggle">
                <button className={`login-role-btn ${role === 'player' ? 'active' : ''}`} onClick={() => { setRole('player'); setErr(''); }}>Player</button>
                <button className={`login-role-btn ${role === 'admin' ? 'active' : ''}`} onClick={() => { setRole('admin'); setErr(''); }}>Admin</button>
              </div>

              {err && <div className="login-error">{err}</div>}

              {role === 'admin' ? (
                <div>
                  <input placeholder="Username" value={user} onChange={e => { setUser(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && handleAdminLogin()} />
                  <input type="password" placeholder="Password" value={pass} onChange={e => { setPass(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && handleAdminLogin()} />
                  <button className="btn btn-primary" onClick={handleAdminLogin}>Sign In</button>
                  <p className="login-hint">Password: bdl2026</p>
                </div>
              ) : (
                <div>
                  <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:16}}>Enter the email or cell number on your account.</p>
                  <input placeholder="Email or cell number" value={lookup} onChange={e => { setLookup(e.target.value); setErr(''); }} onKeyDown={e => e.key === 'Enter' && handlePlayerLookup()} />
